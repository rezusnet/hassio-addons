arch:
  - aarch64
  - amd64
description: "Readarr - based on linuxserver/docker-readarr"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/readarr-{arch}
init: false
name: Readarr
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/readarr
  env_vars: []
ports:
  8787/tcp: 8787
ports_description:
  8787/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8787
panel_icon: mdi:server
slug: readarr
url: https://github.com/linuxserver/docker-readarr
version: 1.0.0
