arch:
  - aarch64
  - amd64
description: "Doplarr - based on linuxserver/docker-doplarr"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/doplarr-{arch}
init: false
name: Doplarr
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/doplarr
  env_vars: []
ports:
  7078/tcp: 7078
ports_description:
  7078/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 7078
panel_icon: mdi:server
slug: doplarr
url: https://github.com/linuxserver/docker-doplarr
version: "1.54.1"
