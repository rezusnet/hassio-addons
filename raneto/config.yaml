arch:
  - aarch64
  - amd64
description: >
  Raneto — markdown-powered knowledge base and wiki platform.
  Create searchable documentation and FAQs using static Markdown files.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/raneto-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
name: Raneto
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /config/raneto
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:book-open-page-variant-outline
ports:
  3000/tcp: null
ports_description:
  3000/tcp: HTTP web interface (optional, not required for Ingress)
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: raneto
udev: true
url: http://raneto.com
version: "1.0.0"

