arch:
  - aarch64
  - amd64
description: >-
  Hishtory is a private AI-powered shell history manager. Backup and sync your
  shell history across machines, search efficiently through your command
  history, and get AI suggestions. Keeps your history completely private on
  your own server.
environment:
  PUID: "0"
  PGID: "0"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/hisshtory-server-{arch}
init: true
name: Hishtory Server
options:
  PUID: 0
  PGID: 0
  TZ: ""
  data_location: /share/hisshtory
  server_port: 8000
  db_host: ""
  db_port: 5432
  db_name: hishtory
  db_user: hishtory
  db_password: ""
  env_vars: []
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Hishtory Server"
schema:
  PUID: int
  PGID: int
  TZ: str?
  data_location: str
  server_port: int(1, 65535)
  db_host: str?
  db_port: int(1, 65535)
  db_name: str
  db_user: str
  db_password: password?
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: hisshtory-server
url: https://github.com/ddpom/hishtory
version: 0.250
