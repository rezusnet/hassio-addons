arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description: >
  Davos is an FTP automation tool that periodically scans given host
  locations for new files. Configure RSS feeds, FTP servers, and web
  pages to monitor and automatically download new content.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/davos-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Davos
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/davos
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  DOCKER_MODS: []
panel_icon: mdi:download
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Web UI
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  DOCKER_MODS:
    - match(^linuxserver/mods:davos-[a-z0-9-]+$)?
slug: davos
udev: true
url: https://github.com/linuxserver/davos
version: "1.0.0"

