arch:
  - aarch64
  - amd64
description: >
  NetBox IPAM/DCIM — Network documentation and management tool.
  Tracks IPs, VLANs, circuits, racks, devices, and more.
  Requires external PostgreSQL and Redis instances.
homeassistant: 2024.1.0
host_network: false
icon: icon.png
image: ghcr.io/rezusnet/netbox-{arch}
ingress: true
ingress_port: 8000
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
name: NetBox
options:
  PUID: 0
  PGID: 0
  TZ: ""
  SUPERUSER_EMAIL: ""
  SUPERUSER_PASSWORD: ""
  ALLOWED_HOST: "*"
  DB_HOST: ""
  DB_PORT: 5432
  DB_NAME: netbox
  DB_USER: netbox
  DB_PASSWORD: ""
  REDIS_HOST: ""
  REDIS_PORT: 6379
  REDIS_USERNAME: ""
  REDIS_PASSWORD: ""
  REDIS_DB_TASK: 0
  REDIS_DB_CACHE: 1
  BASE_PATH: ""
  CSRF_TRUSTED_ORIGINS: ""
  REMOTE_AUTH_ENABLED: false
  env_vars: []
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
schema:
  PUID: int
  PGID: int
  TZ: str?
  SUPERUSER_EMAIL: email
  SUPERUSER_PASSWORD: password
  ALLOWED_HOST: str
  DB_HOST: str
  DB_PORT: int
  DB_NAME: str
  DB_USER: str
  DB_PASSWORD: password
  REDIS_HOST: str
  REDIS_PORT: int
  REDIS_USERNAME: str?
  REDIS_PASSWORD: password?
  REDIS_DB_TASK: int
  REDIS_DB_CACHE: int
  BASE_PATH: str?
  CSRF_TRUSTED_ORIGINS: str?
  REMOTE_AUTH_ENABLED: bool?
  REMOTE_AUTH_BACKEND: str?
  REMOTE_AUTH_HEADER: str?
  REMOTE_AUTH_AUTO_CREATE_USER: bool?
  REMOTE_AUTH_DEFAULT_GROUPS: str?
  REMOTE_AUTH_DEFAULT_PERMISSIONS: str?
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: password?
  cifsdomain: str?
slug: netbox
startup: application
boot: auto
url: https://github.com/rezusnet/hassio-addons
version: "1.0.0"

