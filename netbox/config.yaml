arch:
  - aarch64
  - amd64
description: "NetBox - based on linuxserver/docker-netbox"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/netbox-{arch}
init: false
name: NetBox
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/netbox
  env_vars: []
ports:
  8001/tcp: 8001
ports_description:
  8001/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8001
panel_icon: mdi:server
slug: netbox
url: https://github.com/linuxserver/docker-netbox
version: "4.1.4"
