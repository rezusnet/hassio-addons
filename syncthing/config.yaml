arch:
  - aarch64
  - amd64
description: "Syncthing - based on linuxserver/docker-syncthing"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/syncthing-{arch}
init: false
name: Syncthing
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/syncthing
  env_vars: []
ports:
  8384/tcp: 8384
ports_description:
  8384/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8384
panel_icon: mdi:server
slug: syncthing
url: https://github.com/linuxserver/docker-syncthing
version: 1.0.0
