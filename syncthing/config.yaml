arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description:
  Open source continuous file synchronization. Syncs files between devices
  without a central server, using peer-to-peer TLS-encrypted connections.
devices:
  - /dev/fuse
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/syncthing-{arch}
ingress: true
ingress_port: 8384
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
  - homeassistant_config:rw
  - backup:rw
name: Syncthing
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/syncthing
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:sync
ports:
  8384/tcp: 8384
  22000/tcp: 22000
  22000/udp: 22000
  21027/udp: 21027
ports_description:
  8384/tcp: WebUI (HTTP)
  22000/tcp: Sync listening port (TCP)
  22000/udp: Sync listening port (UDP)
  21027/udp: Local discovery port (UDP)
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: syncthing
udev: true
url: https://syncthing.net
version: "1.0.0"

