---
arch:
  - aarch64
  - amd64
description: PairDrop test - unpatched LSIO image
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/pairdrop-{arch}
ingress: true
ingress_port: 3000
ingress_stream: true
init: false
map:
  - addon_config:rw
name: PairDrop Test
options:
  PGID: 0
  PUID: 0
  data_location: /config
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  rate_limit: false
  ws_fallback: false
  debug_mode: false
  env_vars: []
panel_icon: mdi:share-variant
schema:
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  rate_limit: bool
  ws_fallback: bool
  debug_mode: bool
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: pairdrop
url: https://github.com/schlagmichdoch/PairDrop
version: "1.11.2-21"
