arch:
  - aarch64
  - amd64
description:
  Cross-platform local file sharing via browser. AirDrop-like peer-to-peer
  transfers using WebRTC. No cloud upload required.
devices:
  - /dev/dri
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/mmcblk
  - /dev/fuse
environment:
  ATTACHED_DEVICES_PERMS: "/dev/dri -type c -o -type f"
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/pairdrop-{arch}
ingress: true
ingress_port: 3000
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: PairDrop
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/pairdrop
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  rate_limit: false
  ws_fallback: false
  debug_mode: false
panel_icon: mdi:share-variant
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: Web UI for file sharing
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  rate_limit: bool
  ws_fallback: bool
  debug_mode: bool
slug: pairdrop
udev: true
url: https://github.com/schlagmichdoch/PairDrop
version: "1.11.2"
