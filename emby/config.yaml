arch:
  - aarch64
  - amd64
description: "Emby - based on linuxserver/docker-emby"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/emby-{arch}
init: false
name: Emby
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/emby
  env_vars: []
ports:
  8096/tcp: 8096
ports_description:
  8096/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8096
panel_icon: mdi:server
slug: emby
url: https://github.com/linuxserver/docker-emby
version: 1.0.0
