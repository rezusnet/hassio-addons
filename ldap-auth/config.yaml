arch:
  - aarch64
  - amd64
description:
  Reverse proxy authentication daemon with LDAP/Active Directory support.
  Provides LDAP-based SSO for services behind a reverse proxy. Based on the linuxserver.io image.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/ldap-auth-{arch}
init: false
map:
  - addon_config:rw
name: LDAP Auth
options:
  env_vars: []
  PGID: 0
  PUID: 0
  TZ: ""
  fernet_key: ""
  certfile: ""
  keyfile: ""
panel_admin: false
panel_icon: mdi:shield-lock
ports:
  8888/tcp: 8888
  9000/tcp: 9000
ports_description:
  8888/tcp: LDAP Auth Daemon
  9000/tcp: Login Page
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  TZ: str?
  fernet_key: password?
  certfile: str?
  keyfile: str?
slug: ldap-auth
url: https://github.com/nginxinc/nginx-ldap-auth
version: "1.0.0"

