arch:
  - aarch64
  - amd64
description: "Lidarr - based on linuxserver/docker-lidarr"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/lidarr-{arch}
init: false
name: Lidarr
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/lidarr
  env_vars: []
ports:
  8686/tcp: 8686
ports_description:
  8686/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8686
panel_icon: mdi:server
slug: lidarr
url: https://github.com/linuxserver/docker-lidarr
version: 1.0.0
