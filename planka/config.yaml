arch:
  - aarch64
  - amd64
description: "Planka - based on linuxserver/docker-planka"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/planka-{arch}
init: false
name: Planka
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/planka
  env_vars: []
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 3000
panel_icon: mdi:server
slug: planka
url: https://github.com/linuxserver/docker-planka
version: "1.75.5"
