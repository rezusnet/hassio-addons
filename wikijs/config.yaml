arch:
  - aarch64
  - amd64
description: "Wiki.js - based on linuxserver/docker-wikijs"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/wikijs-{arch}
init: false
name: Wiki.js
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/wikijs
  env_vars: []
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8080
panel_icon: mdi:server
slug: wikijs
url: https://github.com/linuxserver/docker-wikijs
version: "3.0.0"
