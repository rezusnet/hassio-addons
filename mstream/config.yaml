arch:
  - aarch64
  - amd64
description: "mStream - based on linuxserver/docker-mstream"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/mstream-{arch}
init: false
name: mStream
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/mstream
  env_vars: []
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 3000
panel_icon: mdi:server
slug: mstream
url: https://github.com/linuxserver/docker-mstream
version: "5.11.32"
