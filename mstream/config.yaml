arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description: Personal music streaming server with web UI, playlist management, file explorer, and jukebox mode
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/mstream-{arch}
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: mStream
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/mstream
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  DOCKER_MODS: []
  music_path: /music
ports:
  3000/tcp: 3300
ports_description:
  3000/tcp: Web interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  DOCKER_MODS:
    - match(^linuxserver/mods:universal-[a-z0-9-]+$)?
  music_path: str
slug: mstream
url: https://mstream.io/
version: "1.0.0"

