arch:
  - aarch64
  - amd64
description: "ngIRCd - based on linuxserver/docker-ngircd"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/ngircd-{arch}
init: false
name: ngIRCd
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/ngircd
  env_vars: []
ports:
  6667/tcp: 6667
ports_description:
  6667/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 6667
panel_icon: mdi:server
slug: ngircd
url: https://github.com/linuxserver/docker-ngircd
version: 1.0.0
