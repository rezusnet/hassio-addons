<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6f42c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5035ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#grad1)"/>
  
  <!-- Title -->
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">
    TheLounge
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="36" fill="#e0e0e0" text-anchor="middle">
    IRC Web Client
  </text>
  
  <!-- Tagline -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="24" fill="#b0b0b0" text-anchor="middle">
    Connect. Chat. Stay Online.
  </text>
  
  <!-- Chat icon -->
  <circle cx="150" cy="300" r="40" fill="rgba(255,255,255,0.1)"/>
  <path d="M 140 285 L 140 315 M 130 300 L 160 300" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="1050" cy="100" r="40" fill="rgba(255,255,255,0.1)"/>
  <path d="M 1040 85 L 1040 115 M 1030 100 L 1060 100" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
