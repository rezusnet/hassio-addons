arch:
  - aarch64
  - amd64
description: "The Lounge - based on linuxserver/docker-thelounge"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/thelounge-{arch}
init: false
name: The Lounge
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/thelounge
  env_vars: []
ports:
  9000/tcp: 9000
ports_description:
  9000/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 9000
panel_icon: mdi:server
slug: thelounge
url: https://github.com/linuxserver/docker-thelounge
version: 1.0.0
