arch:
  - aarch64
  - amd64
description: "Grocy - based on linuxserver/docker-grocy"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/grocy-{arch}
init: false
name: Grocy
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/grocy
  env_vars: []
ports:
  80/tcp: 80
ports_description:
  80/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 80
panel_icon: mdi:server
slug: grocy
url: https://github.com/linuxserver/docker-grocy
version: 1.0.0
