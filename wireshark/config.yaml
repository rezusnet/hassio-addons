arch:
  - aarch64
  - amd64
description: "Wireshark - based on linuxserver/docker-wireshark"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/wireshark-{arch}
init: false
name: Wireshark
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/wireshark
  env_vars: []
ports:
  # No ports
ports_description:
  # No ports
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: wireshark
url: https://github.com/linuxserver/docker-wireshark
version: 1.0.0
