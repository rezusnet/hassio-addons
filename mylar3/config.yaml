arch:
  - aarch64
  - amd64
description: "Mylar3 - based on linuxserver/docker-mylar3"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/mylar3-{arch}
init: false
name: Mylar3
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/mylar3
  env_vars: []
ports:
  8090/tcp: 8090
ports_description:
  8090/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8090
panel_icon: mdi:server
slug: mylar3
url: https://github.com/linuxserver/docker-mylar3
version: 1.0.0
