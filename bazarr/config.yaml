arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/logs/*"
description:
  Subtitle manager for Sonarr and Radarr. Automatically downloads and manages
  subtitles for your TV series and movies.
devices:
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/mmcblk
  - /dev/fuse
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/bazarr-{arch}
ingress: true
ingress_port: 0
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Bazarr
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/bazarr
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:subtitles
ports:
  6767/tcp: 6767
ports_description:
  6767/tcp: Web interface
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: bazarr
udev: true
url: https://www.bazarr.media
version: "1.5.6"
