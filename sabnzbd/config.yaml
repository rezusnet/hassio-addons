arch:
  - aarch64
  - amd64
description: "SABnzbd - based on linuxserver/docker-sabnzbd"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/sabnzbd-{arch}
init: false
name: SABnzbd
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/sabnzbd
  env_vars: []
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8080
panel_icon: mdi:server
slug: sabnzbd
url: https://github.com/linuxserver/docker-sabnzbd
version: 1.0.0
