arch:
  - aarch64
  - amd64
description: "SealSkin - based on linuxserver/docker-sealskin"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/sealskin-{arch}
init: false
name: SealSkin
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/sealskin
  env_vars: []
ports:
  # No ports
ports_description:
  # No ports
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: sealskin
url: https://github.com/linuxserver/docker-sealskin
version: "3.0"
