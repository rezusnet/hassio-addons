arch:
  - aarch64
  - amd64
description: >
  SmokePing tracks network latency over time. It measures latency to configured
  targets using multiple probe types (fping, tcpping, curl, DNS) and renders
  interactive graphs. Supports master/slave mode for distributed monitoring.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/smokeping-{arch}
ingress: true
ingress_port: 80
ingress_stream: true
ingress_entry: smokeping/smokeping.cgi
map:
  - addon_config:rw
icon: icon.png
name: SmokePing
options:
  env_vars: []
  TZ: ""
  MASTER_URL: ""
  SHARED_SECRET: ""
  CACHE_DIR: /tmp
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  panel_icon: mdi:access-point-network
ports:
  80/tcp: 80
ports_description:
  80/tcp: Web UI (ingress enabled)
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  TZ: str?
  MASTER_URL: str?
  SHARED_SECRET: password?
  CACHE_DIR: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  panel_icon: str
slug: smokeping
url: https://oss.oetiker.ch/smokeping/
version: "1.0.0"

