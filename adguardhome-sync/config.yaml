arch:
  - aarch64
  - amd64
description: "AdGuard Home Sync - based on linuxserver/docker-adguardhome-sync"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/adguardhome-sync-{arch}
init: false
name: AdGuard Home Sync
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/adguardhome-sync
  env_vars: []
ports:
  # No ports
ports_description:
  # No ports
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: adguardhome-sync
url: https://github.com/linuxserver/docker-adguardhome-sync
version: 1.0.0
