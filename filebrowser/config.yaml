arch:
  - aarch64
  - amd64
description:
  Web-based file manager for browsing, uploading, editing, and sharing files
  from your Home Assistant system and mounted storage.
devices:
  - /dev/dri
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/mmcblk
  - /dev/fuse
environment:
  FB_BASEURL: /filebrowser
  PGID: "0"
  PUID: "0"
homeassistant: 2025.5.0
image: ghcr.io/rezusnet/filebrowser-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
init: true
map:
  - addon_config:rw
  - media:rw
  - all_addon_configs:rw
  - homeassistant_config:rw
  - addons:rw
  - backup:rw
  - share:rw
  - ssl:rw
icon: icon.png
name: Filebrowser
options:
  NoAuth: true
  TZ: ""
  base_folder: ""
  certfile: fullchain.pem
  cifsdomain: ""
  cifspassword: ""
  cifsusername: ""
  disable_thumbnails: true
  env_vars: []
  keyfile: privkey.pem
  localdisks: ""
  networkdisks: ""
  ssl: false
panel_admin: false
panel_icon: mdi:file-search
ports:
  8080/tcp: 8071
ports_description:
  8080/tcp: Web UI port
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  NoAuth: bool
  TZ: str?
  base_folder: str?
  certfile: str
  cifsdomain: str?
  cifspassword: str?
  cifsusername: str?
  disable_thumbnails: bool?
  keyfile: str
  localdisks: str?
  networkdisks: str?
  ssl: bool
slug: filebrowser
udev: true
url: https://filebrowser.org
version: "2.63.2"
