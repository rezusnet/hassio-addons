arch:
  - aarch64
  - amd64
description: >-
  Piper is a fast, offline neural text-to-speech system. Convert text to
  natural-sounding speech using a lightweight TTS engine. Supports multiple
  languages and voices with excellent quality and low latency.
environment:
  PUID: "0"
  PGID: "0"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/piper-{arch}
init: true
name: Piper
options:
  PUID: 0
  PGID: 0
  TZ: ""
  data_location: /share/piper
  models_location: /share/piper/models
  server_port: 8000
  env_vars: []
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Piper TTS Server"
schema:
  PUID: int
  PGID: int
  TZ: str?
  data_location: str
  models_location: str
  server_port: int(1, 65535)
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: false
panel_icon: mdi:speaker
slug: piper
url: https://github.com/rhasspy/piper
version: 1.2.0
