arch:
  - aarch64
  - amd64
description: "Piper - based on linuxserver/docker-piper"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/piper-{arch}
init: false
name: Piper
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/piper
  env_vars: []
ports:
  # No ports
ports_description:
  # No ports
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: piper
url: https://github.com/linuxserver/docker-piper
version: 1.0.0
