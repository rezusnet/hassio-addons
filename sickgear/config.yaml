arch:
  - aarch64
  - amd64
description:
  SickGear — TV show manager that tracks episodes, finds new releases via indexers,
  and interfaces with download clients for automated episode acquisition.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/sickgear-{arch}
ingress: true
ingress_port: 8081
ingress_stream: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
icon: icon.png
name: SickGear
options:
  env_vars: []
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /config
  tv_folder: /share/sickgear/tv
  downloads_folder: /share/sickgear/downloads
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:television-classic
ports:
  8081/tcp: 8081
ports_description:
  8081/tcp: SickGear Web UI
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  tv_folder: str
  downloads_folder: str
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: sickgear
url: https://github.com/sickgear/sickgear
version: "1.0.0"

