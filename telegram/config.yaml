arch:
  - aarch64
  - amd64
description: "Telegram - based on linuxserver/docker-telegram"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/telegram-{arch}
init: false
name: Telegram
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/telegram
  env_vars: []
ports:
  # No ports
ports_description:
  # No ports
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: telegram
url: https://github.com/linuxserver/docker-telegram
version: 1.0.0
