arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description: Free photo-management tool with a clean interface for uploading, managing, and sharing photos
environment:
  ATTACHED_DEVICES_PERMS: "/dev/dri /dev/vchiq /dev/vc-mem /dev/video1? -type c -o -type f"
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/lychee-{arch}
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Lychee
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/lychee
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  DOCKER_MODS: []
  pictures_path: /pictures
  db_connection: sqlite
  db_host: ""
  db_port: ""
  db_username: ""
  db_password: ""
  db_database: lychee
  app_name: Lychee
  trusted_proxies: ""
ports:
  80/tcp: 8781
ports_description:
  80/tcp: Web interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  DOCKER_MODS:
    - match(^linuxserver/mods:universal-[a-z0-9-]+$)?
  pictures_path: str
  db_connection: list(sqlite|mysql|pgsql)
  db_host: str?
  db_port: str?
  db_username: str?
  db_password: password?
  db_database: str?
  app_name: str?
  trusted_proxies: str?
slug: lychee
url: https://lycheeorg.github.io/
version: "1.0.0"

