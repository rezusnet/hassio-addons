arch:
  - aarch64
  - amd64
description: "hiSHtory Server - based on linuxserver/docker-hishtory-server"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/hishtory-server-{arch}
init: false
name: hiSHtory Server
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/hishtory-server
  env_vars: []
ports:
  7600/tcp: 7600
ports_description:
  7600/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 7600
panel_icon: mdi:server
slug: hishtory-server
url: https://github.com/linuxserver/docker-hishtory-server
version: 1.0.0
