arch:
  - aarch64
  - amd64
description: "Your Spotify - based on linuxserver/docker-your"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/your-{arch}
init: false
name: Your Spotify
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/your
  env_vars: []
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8080
panel_icon: mdi:server
slug: your
url: https://github.com/linuxserver/docker-your
version: 1.0.0
