arch:
  - aarch64
  - amd64
description: "Healthchecks - based on linuxserver/docker-healthchecks"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/healthchecks-{arch}
init: false
name: Healthchecks
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/healthchecks
  env_vars: []
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8000
panel_icon: mdi:server
slug: healthchecks
url: https://github.com/linuxserver/docker-healthchecks
version: 1.0.0
