<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Code Server banner</title>
  <desc id="desc">Code Server Home Assistant add-on banner</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1e" />
      <stop offset="100%" stop-color="#007acc" />
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)" />
  <circle cx="1070" cy="62" r="168" fill="#ffffff" opacity="0.05" />
  <circle cx="945" cy="220" r="124" fill="#0e639c" opacity="0.14" />
  <rect x="42" y="42" width="1116" height="196" rx="24" fill="#ffffff" opacity="0.06" />
  <text x="78" y="104" fill="#d4d4d4" font-size="22" font-family="Arial, Helvetica, sans-serif" letter-spacing="3">HOME ASSISTANT ADD-ON</text>
  <text x="78" y="170" fill="#ffffff" font-size="66" font-weight="700" font-family="Arial, Helvetica, sans-serif">Code Server</text>
  <text x="78" y="214" fill="#ececec" font-size="29" font-family="Arial, Helvetica, sans-serif">VS Code on a remote server, accessible through the browser</text>
</svg>
