arch:
  - aarch64
  - amd64
description: "UniFi Network Application - based on linuxserver/docker-unifi-network-application"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/unifi-network-application-{arch}
init: false
name: UniFi Network Application
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/unifi-network-application
  env_vars: []
ports:
  8443/tcp: 8443
ports_description:
  8443/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8443
panel_icon: mdi:server
slug: unifi-network-application
url: https://github.com/linuxserver/docker-unifi-network-application
version: "8.7.3"
