<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Medusa banner</title>
  <desc id="desc">Medusa Home Assistant add-on banner</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D32F2F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)"/>
  <text x="600" y="160" font-size="72" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">Medusa</text>
  <text x="600" y="220" font-size="28" fill="#FFE0E0" text-anchor="middle" dominant-baseline="middle">Automatic Video Library Manager</text>
</svg>
