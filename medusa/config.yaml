arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description:
  An automatic Video Library Manager for TV Shows. Watches for new episodes
  of your favorite shows and automatically handles the downloading process.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/medusa-{arch}
ingress: true
ingress_port: 8081
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Medusa
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/medusa
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:television-play
ports:
  8081/tcp: 8081
ports_description:
  8081/tcp: Web interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: medusa
url: https://pymedusa.com/
version: "1.0.25"
