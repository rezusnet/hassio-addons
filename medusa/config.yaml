arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
description:
  Automatic video library manager for TV shows. Watches for new episodes
  and handles downloading, sorting, and renaming. Based on the linuxserver.io image.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/medusa-{arch}
ingress: true
ingress_port: 8081
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
  - media:rw
name: Medusa
options:
  env_vars: []
  PGID: 0
  PUID: 0
  TZ: ""
  tv_location: /share/tv
  downloads_location: /share/downloads
panel_admin: false
panel_icon: mdi:television-classic
ports:
  8081/tcp: 8081
ports_description:
  8081/tcp: Web Interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  TZ: str?
  tv_location: str
  downloads_location: str
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: medusa
url: https://pymedusa.com
version: "1.0.0"

