arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description: >
  Baby Buddy helps caregivers track sleep, feedings, diaper changes, tummy
  time and more to learn about and predict baby's needs.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/babybuddy-{arch}
ingress: true
ingress_port: 8000
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
  - ssl
name: Baby Buddy
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/babybuddy
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  CSRF_TRUSTED_ORIGINS: ""
  DOCKER_MODS: []
panel_icon: mdi:baby-face-outline
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Web UI
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  CSRF_TRUSTED_ORIGINS: str?
  DOCKER_MODS:
    - match(^linuxserver/mods:babybuddy-[a-z0-9-]+$)?
slug: babybuddy
udev: true
url: https://github.com/babybuddy/babybuddy
version: "1.0.0"

