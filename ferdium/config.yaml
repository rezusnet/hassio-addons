icon: icon.png
homeassistant: "2024.1.0"
name: "Ferdium"
description: "Desktop app combining multiple web messaging services into one"
url: "https://github.com/linuxserver/docker-ferdium"
arch:
  - aarch64
  - amd64
image: ghcr.io/rezusnet/ferdium-{arch}
shm_size: "1gb"
ports:
  3000/tcp: 3000
  3001/tcp: 3001
ports_description:
  3000/tcp: "Ferdium desktop GUI (HTTP, must be proxied)"
  3001/tcp: "Ferdium desktop GUI (HTTPS)"
map:
  - config:rw
options:
  PUID: 1000
  PGID: 1000
  TZ: "Etc/UTC"
  CUSTOM_USER: "abc"
  PASSWORD: ""
schema:
  PUID: int
  PGID: int
  TZ: str
  CUSTOM_USER: str?
  PASSWORD: str?

slug: ferdium
version: "1.0.0"
