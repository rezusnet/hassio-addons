arch:
  - aarch64
  - amd64
description: "Ferdium - based on linuxserver/docker-ferdium"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/ferdium-{arch}
init: false
name: Ferdium
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/ferdium
  env_vars: []
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 3000
panel_icon: mdi:server
slug: ferdium
url: https://github.com/linuxserver/docker-ferdium
version: "6.7.8"
