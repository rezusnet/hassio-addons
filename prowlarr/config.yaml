arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/logs/*"
description:
  Indexer manager for PVR applications. Manages Torznab and Newznab indexers
  for Sonarr, Radarr, Lidarr, and Readarr.
devices:
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/mmcblk
  - /dev/fuse
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/prowlarr-{arch}
ingress: true
ingress_port: 0
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
  - ssl
name: Prowlarr
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/prowlarr
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:cloud-search
ports:
  9696/tcp: 9696
ports_description:
  9696/tcp: Web interface
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: prowlarr
udev: true
url: https://prowlarr.com
version: "2.3.5.5327"
