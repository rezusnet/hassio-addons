arch:
  - aarch64
  - amd64
description: "Airsonic Advanced - based on linuxserver/docker-airsonic-advanced"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/airsonic-advanced-{arch}
init: false
name: Airsonic Advanced
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/airsonic-advanced
  env_vars: []
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8080
panel_icon: mdi:server
slug: airsonic-advanced
url: https://github.com/linuxserver/docker-airsonic-advanced
version: "11.5.0"
