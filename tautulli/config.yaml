arch:
  - aarch64
  - amd64
description: "Tautulli - based on linuxserver/docker-tautulli"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/tautulli-{arch}
init: false
name: Tautulli
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/tautulli
  env_vars: []
ports:
  8181/tcp: 8181
ports_description:
  8181/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8181
panel_icon: mdi:server
slug: tautulli
url: https://github.com/linuxserver/docker-tautulli
version: "2.14.5"
