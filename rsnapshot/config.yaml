arch:
  - aarch64
  - amd64
description: >
  rsnapshot — filesystem snapshot utility based on rsync.
  Periodic local and remote backups using hard links for space efficiency.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/rsnapshot-{arch}
ingress: false
init: false
map:
  - addon_config:rw
  - share:rw
  - backup:rw
  - homeassistant_config:ro
  - media:ro
  - ssl:ro
name: rsnapshot
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /config/rsnapshot
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:backup-restore
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: rsnapshot
udev: true
url: http://www.rsnapshot.org
version: "1.0.0"

