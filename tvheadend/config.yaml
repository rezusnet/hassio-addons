icon: icon.png
homeassistant: "2024.1.0"
name: "TVHeadend"
description: "TV streaming server and recorder (PVR) supporting DVB, IPTV, SAT>IP, and HDHomeRun"
url: "https://github.com/linuxserver/docker-tvheadend"
arch:
  - aarch64
  - amd64
image: ghcr.io/rezusnet/tvheadend-{arch}
ingress: true
ingress_port: 9981
ports:
  9981/tcp: 9981
  9982/tcp: 9982
ports_description:
  9981/tcp: "TVHeadend WebUI"
  9982/tcp: "HTSP server port (for Kodi/Movian clients)"
map:
  - config:rw
devices:
  - /dev/dri
  - /dev/dvb
options:
  PUID: 1000
  PGID: 1000
  TZ: "Etc/UTC"
  RUN_OPTS: ""
schema:
  PUID: int
  PGID: int
  TZ: str
  RUN_OPTS: str?

slug: tvheadend
version: "1.0.0"
