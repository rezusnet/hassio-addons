arch:
  - aarch64
  - amd64
description: "TVHeadend - based on linuxserver/docker-tvheadend"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/tvheadend-{arch}
init: false
name: TVHeadend
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/tvheadend
  env_vars: []
ports:
  9981/tcp: 9981
ports_description:
  9981/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 9981
panel_icon: mdi:server
slug: tvheadend
url: https://github.com/linuxserver/docker-tvheadend
version: 1.0.0
