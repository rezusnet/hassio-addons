---
arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/logs/*"
  - "**/MediaCover/*"
description:
  Book manager and automation for Usenet and BitTorrent users. A Readarr fork
  with native rreading-glasses metadata integration.
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/bookshelf-{arch}
ingress: true
ingress_port: 8787
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Bookshelf
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/bookshelf
  TZ: ""
  metadata_url: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:bookshelf
ports:
  8787/tcp: 8787
ports_description:
  8787/tcp: Web interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  metadata_url: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: bookshelf
url: https://github.com/pennydreadful/bookshelf
version: "0.4.20.129"
