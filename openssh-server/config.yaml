arch:
  - aarch64
  - amd64
description: "OpenSSH Server - based on linuxserver/docker-openssh-server"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/openssh-server-{arch}
init: false
name: OpenSSH Server
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/openssh-server
  env_vars: []
ports:
  2222/tcp: 2222
ports_description:
  2222/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 2222
panel_icon: mdi:server
slug: openssh-server
url: https://github.com/linuxserver/docker-openssh-server
version: 1.0.0
