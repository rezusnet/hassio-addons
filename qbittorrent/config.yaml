arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/logs/*"
description:
  Cross-platform BitTorrent client with web UI. Feature-rich, fast, and
  lightweight torrent downloading and management.
devices:
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/mmcblk
  - /dev/fuse
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/qbittorrent-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: qBittorrent
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/qbittorrent
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:download
ports:
  8080/tcp: 8080
  6881/tcp: 6881
  6881/udp: 6881
ports_description:
  8080/tcp: Web interface
  6881/tcp: Torrent port (TCP)
  6881/udp: Torrent port (UDP)
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: qbittorrent
udev: true
url: https://www.qbittorrent.org
version: "5.1.4"
