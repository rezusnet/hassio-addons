arch:
  - aarch64
  - amd64
description: "syslog-ng - based on linuxserver/docker-syslog-ng"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/syslog-ng-{arch}
init: false
name: syslog-ng
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/syslog-ng
  env_vars: []
ports:
  514/tcp: 514
ports_description:
  514/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 514
panel_icon: mdi:server
slug: syslog-ng
url: https://github.com/linuxserver/docker-syslog-ng
version: 1.0.0
