arch:
  - aarch64
  - amd64
description: >-
  syslog-ng is an advanced logging daemon. Collect, normalize, and forward
  logs from multiple sources. Features include flexible log routing, filtering,
  and transformation with support for various transport methods.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/syslog-ng-{arch}
init: false
name: Syslog-ng
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/syslog-ng
  env_vars: []
ports:
  514/udp: 514
  514/tcp: 515
  601/tcp: 601
ports_description:
  514/udp: "Syslog UDP"
  514/tcp: "Syslog TCP"
  601/tcp: "Syslog TLS"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: syslog-ng
url: https://www.syslog-ng.com/
version: 4.8.0
