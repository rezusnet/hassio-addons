arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description:
  A Free and Open Source download manager written in Python and designed to be
  extremely lightweight, easily extensible and fully manageable via web.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/pyload-ng-{arch}
ingress: true
ingress_port: 8000
init: false
map:
  - addon_config:rw
  - share:rw
name: pyLoad-ng
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/pyload-ng
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:cloud-download
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Web interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: pyload-ng
url: https://pyload.net
version: "0.6.2"
