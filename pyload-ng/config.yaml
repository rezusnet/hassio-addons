arch:
  - aarch64
  - amd64
description: >
  pyLoad NG — free and open source download manager for one-click hosters.
  Lightweight, extensible, and fully manageable via web interface.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/pyload-ng-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
name: pyLoad NG
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /config/pyload-ng
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:download-circle-outline
ports:
  8000/tcp: null
  9666/tcp: null
ports_description:
  8000/tcp: HTTP web interface (optional, not required for Ingress)
  9666/tcp: Click'n'Load port (optional)
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: pyload-ng
udev: true
url: https://pyload.net
version: "1.0.0"

