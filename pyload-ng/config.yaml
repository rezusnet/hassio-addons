arch:
  - aarch64
  - amd64
description: A lightweight, open-source download manager written in Python. Fully manageable via web interface.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/pyload-ng-{arch}
ingress: true
ingress_port: 8000
init: false
map:
  - addon_config:rw
  - share:rw
name: pyLoad-ng
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/pyload-ng
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:download
ports:
  8000/tcp: 8000
  9666/tcp: 9666
ports_description:
  8000/tcp: Web interface
  9666/tcp: Click'n'Load port (optional)
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: pyload-ng
url: https://pyload.net
version: "0.5.0"
