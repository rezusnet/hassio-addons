icon: icon.png
homeassistant: "2024.1.0"
name: "Grav"
description: "Modern flat-file CMS — no database needed"
url: "https://github.com/linuxserver/docker-grav"
arch:
  - aarch64
  - amd64
image: ghcr.io/rezusnet/grav-{arch}
webui: "http://[HOST]:[PORT:80]"
ports:
  80/tcp: 80
ports_description:
  80/tcp: "Grav web interface"
map:
  - config:rw
  - share:rw
options:
  PUID: 1000
  PGID: 1000
  TZ: "Etc/UTC"
schema:
  PUID: int
  PGID: int
  TZ: str

slug: grav
version: "1.0.0"
