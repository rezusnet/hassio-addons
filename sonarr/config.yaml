arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/logs/*"
  - "**/MediaCover/*"
description: Smart PVR for newsgroup and bittorrent users. Monitors RSS feeds for
  new TV episodes and manages downloading, sorting, and renaming.
devices:
  - /dev/dri
  - /dev/dri/card0
  - /dev/dri/card1
  - /dev/dri/renderD128
  - /dev/vchiq
  - /dev/ttyUSB0
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/mmcblk
  - /dev/fuse
environment:
  ATTACHED_DEVICES_PERMS: "/dev/dri /dev/vchiq -type c -o -type f"
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/sonarr-{arch}
ingress: true
ingress_port: 0
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Sonarr
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/sonarr
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:television-classic
ports:
  8989/tcp: 8989
ports_description:
  8989/tcp: Web interface
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: sonarr
udev: true
url: https://sonarr.tv
version: "4.0.17.2952"
