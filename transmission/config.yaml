arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/logs/*"
description: Fast, easy, and free BitTorrent client. Lightweight torrent downloading
  with web interface.
devices:
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/mmcblk
  - /dev/fuse
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/transmission-{arch}
ingress: true
ingress_port: 0
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Transmission
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/transmission
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:progress-download
ports:
  9091/tcp: 9091
  51413/tcp: 51413
  51413/udp: 51413
ports_description:
  9091/tcp: Web interface
  51413/tcp: Torrent port (TCP)
  51413/udp: Torrent port (UDP)
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: transmission
udev: true
url: https://transmissionbt.com
version: "4.1.1"
