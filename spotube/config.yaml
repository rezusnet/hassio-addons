arch:
  - aarch64
  - amd64
description: "Spotube - based on linuxserver/docker-spotube"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/spotube-{arch}
init: false
name: Spotube
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/spotube
  env_vars: []
ports:
  # No ports
ports_description:
  # No ports
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: spotube
url: https://github.com/linuxserver/docker-spotube
version: "3.10.0"
