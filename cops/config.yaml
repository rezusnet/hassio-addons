arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
description:
  COPS stands for Calibre OPDS (and HTML) Php Server. COPS links to your Calibre
  library database and allows downloading and emailing of books directly from a web
  browser and provides an OPDS feed to connect to your devices.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/cops-{arch}
ingress: true
ingress_port: 80
init: false
map:
  - addon_config:rw
  - share:rw
name: COPS
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/cops
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:book-open
ports:
  80/tcp: 80
ports_description:
  80/tcp: Web interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: cops
url: https://github.com/mikespub-org/seblucas-cops
version: "4.3.1"
