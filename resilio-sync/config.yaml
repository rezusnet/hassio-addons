arch:
  - aarch64
  - amd64
description: "Resilio Sync - based on linuxserver/docker-resilio-sync"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/resilio-sync-{arch}
init: false
name: Resilio Sync
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/resilio-sync
  env_vars: []
ports:
  8888/tcp: 8888
ports_description:
  8888/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8888
panel_icon: mdi:server
slug: resilio-sync
url: https://github.com/linuxserver/docker-resilio-sync
version: 1.0.0
