arch:
  - aarch64
  - amd64
description: "PhpMyAdmin - based on linuxserver/docker-phpmyadmin"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/phpmyadmin-{arch}
init: false
name: PhpMyAdmin
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/phpmyadmin
  env_vars: []
ports:
  80/tcp: 80
ports_description:
  80/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 80
panel_icon: mdi:database
slug: phpmyadmin
url: https://github.com/linuxserver/docker-phpmyadmin
version: 1.0.0
