arch:
  - aarch64
  - amd64
description: "Flexget - based on linuxserver/docker-flexget"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/flexget-{arch}
init: false
name: Flexget
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/flexget
  env_vars: []
ports:
  5050/tcp: 5050
ports_description:
  5050/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 5050
panel_icon: mdi:server
slug: flexget
url: https://github.com/linuxserver/docker-flexget
version: 1.0.0
