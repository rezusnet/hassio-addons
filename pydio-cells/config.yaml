arch:
  - aarch64
  - amd64
description:
  Pydio Cells — enterprise file sharing and collaboration platform with granular
  access control, versioning, and workflow automation.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/pydio-cells-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
map:
  - addon_config:rw
  - share:rw
icon: icon.png
name: Pydio Cells
options:
  env_vars: []
  PGID: 0
  PUID: 0
  TZ: ""
  EXTERNALURL: ""
  SERVER_IP: ""
  data_location: /config
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:cloud-upload
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: HTTPS web interface & API
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  TZ: str?
  EXTERNALURL: str?
  SERVER_IP: str?
  data_location: str
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: pydio-cells
url: https://pydio.com
version: "1.0.0"

