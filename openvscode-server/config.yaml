homeassistant: "2024.1.0"
name: "OpenVSCode Server"
description: "VS Code server accessible through a web browser"
url: "https://github.com/linuxserver/docker-openvscode-server"
arch:
  - aarch64
  - amd64
slug: "openvscode-server"
version: "1.0.0"
webui: "http://[HOST]:[PORT:3000]"
ingress: true
ingress_port: 3000
ingress_stream: true
panel_icon: "mdi:microsoft-visual-studio-code"
panel_title: "VS Code"
startup: "application"
boot: "auto"
map:
  - config:rw
  - share:rw
  - media:rw
options:
  PUID: 1000
  PGID: 1000
  TZ: "Etc/UTC"
  CONNECTION_TOKEN: ""
  SUDO_PASSWORD: ""
schema:
  PUID: int
  PGID: int
  TZ: str
  CONNECTION_TOKEN: password
  SUDO_PASSWORD: password
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "VS Code Web UI"

