arch:
  - aarch64
  - amd64
description: "OpenVSCode Server - based on linuxserver/docker-openvscode-server"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/openvscode-server-{arch}
init: false
name: OpenVSCode Server
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/openvscode-server
  env_vars: []
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 3000
panel_icon: mdi:server
slug: openvscode-server
url: https://github.com/linuxserver/docker-openvscode-server
version: 1.0.0
