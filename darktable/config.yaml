arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description: >
  Darktable is an open source photography workflow application and raw
  developer. A virtual lighttable and darkroom for photographers. Manage
  your digital negatives, develop raw images, and enhance them through a
  web-based GUI.
devices:
  - /dev/dri
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/darktable-{arch}
ingress: true
ingress_port: 3001
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Darktable
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/darktable
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  CUSTOM_USER: ""
  PASSWORD: ""
  DOCKER_MODS: []
panel_icon: mdi:image-filter-hdr
panel_admin: true
ports:
  3000/tcp: null
  3001/tcp: 3001
ports_description:
  3000/tcp: HTTP desktop GUI (not recommended)
  3001/tcp: HTTPS desktop GUI (recommended)
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  CUSTOM_USER: str?
  PASSWORD: password?
  DOCKER_MODS:
    - match(^linuxserver/mods:darktable-[a-z0-9-]+$)?
slug: darktable
udev: true
url: https://www.darktable.org/
version: "1.0.0"
video: true

