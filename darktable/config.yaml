arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
description:
  An open source photography workflow application and raw developer. A virtual
  lighttable and darkroom for photographers. It manages your digital negatives
  in a database and enables you to develop raw images and enhance them.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/darktable-{arch}
ingress: true
ingress_port: 3001
init: false
map:
  - addon_config:rw
  - share:rw
  - ssl
name: Darktable
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/darktable
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:image-edit
ports:
  3000/tcp: 3000
  3001/tcp: 3001
ports_description:
  3000/tcp: Desktop GUI (optional)
  3001/tcp: HTTPS web interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: darktable
url: https://www.darktable.org
version: "25.4.1"
