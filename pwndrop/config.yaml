arch:
  - aarch64
  - amd64
description: |
  Self-hosted file sharing service. Share files securely with a simple link.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/pwndrop-{arch}
ingress: true
ingress_port: 8080
init: false
map:
  - addon_config:rw
  - share:rw
name: Pwndrop
options:
  PGID: 0
  PUID: 0
  data_location: /share/pwndrop
  TZ: ""
panel_icon: mdi:share
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Web interface
schema:
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
slug: pwndrop
url: https://github.com/kiwix/pwndrop
version: "1.0.1"
