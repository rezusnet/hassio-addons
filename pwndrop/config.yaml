arch:
  - aarch64
  - amd64
description: >
  Pwndrop — self-hosted file upload and URL shortening service.
  Share files securely over HTTP and WebDAV with custom short URLs.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/pwndrop-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
name: Pwndrop
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /config/pwndrop
  TZ: ""
  SECRET_PATH: "/pwndrop"
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
panel_icon: mdi:share-variant-outline
ports:
  8080/tcp: null
ports_description:
  8080/tcp: HTTP web GUI (optional, not required for Ingress)
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  SECRET_PATH: str
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: pwndrop
udev: true
url: https://github.com/kgretzky/pwndrop
version: "1.0.0"

