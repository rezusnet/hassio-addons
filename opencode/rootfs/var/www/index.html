<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #16213e; border-radius: 16px; padding: 48px; text-align: center; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  h1 { font-size: 24px; margin-bottom: 12px; }
  p { color: #aaa; margin-bottom: 28px; line-height: 1.5; }
  a.btn { display: inline-block; background: #0f3460; color: #eee; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-size: 16px; font-weight: 600; transition: background .2s; }
  a.btn:hover { background: #1a5276; }
  .hint { margin-top: 20px; font-size: 13px; color: #666; }
</style>
</head>
<body>
<div class="card">
  <h1>OpenCode</h1>
  <p>OpenCode requires a direct connection and cannot run inside the Home Assistant sidebar.</p>
  <a id="link" class="btn" href="#" target="_blank">Open OpenCode</a>
  <div class="hint" id="url"></div>
</div>
<script>
  var url = window.location.protocol + '//' + window.location.hostname + ':8230';
  document.getElementById('link').href = url;
  document.getElementById('url').textContent = url;
</script>
</body>
</html>
