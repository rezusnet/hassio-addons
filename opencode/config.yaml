arch:
  - aarch64
  - amd64
description: >-
  OpenCode is an open source AI coding agent. It provides a browser-based
  interface for AI-powered code editing, analysis, and development with
  support for multiple LLM providers.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2025.5.0
image: ghcr.io/rezusnet/opencode-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
map:
  - addon_config:rw
  - media:rw
  - all_addon_configs:rw
  - homeassistant_config:rw
  - addons:rw
  - backup:rw
  - share:rw
  - ssl:rw
icon: icon.png
name: OpenCode
options:
  env_vars: []
  server_password: ""
  workspace: /homeassistant
panel_admin: true
panel_icon: mdi:robot-outline
ports:
  8081/tcp: 8230
ports_description:
  8081/tcp: OpenCode Web UI
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  server_password: password
  workspace: str
slug: opencode
url: https://github.com/rezusnet/hassio-addons
version: "1.4.3"
