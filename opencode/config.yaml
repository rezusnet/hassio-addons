arch:
  - aarch64
  - amd64
description: >-
  OpenCode is an open source AI coding agent. It provides a browser-based
  interface for AI-powered code editing, analysis, and development with
  support for multiple LLM providers.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2025.5.0
image: ghcr.io/rezusnet/opencode-{arch}
ingress: true
ingress_port: 8080
ingress_stream: true
map:
  - addon_config:rw
  - media:rw
  - all_addon_configs:rw
  - homeassistant_config:rw
  - addons:rw
  - backup:rw
  - share:rw
  - ssl:rw
icon: icon.png
name: OpenCode
options:
  custom_packages: ""
  dev_profile:
    - minimal
  env_vars: []
  git_ssh_key: ""
  git_token: ""
  repositories: []
  server_password: ""
  workspace: /homeassistant
panel_admin: true
panel_icon: mdi:robot-outline
ports:
  8081/tcp: 8230
ports_description:
  8081/tcp: OpenCode Web UI
schema:
  custom_packages: str
  dev_profile:
    - list(minimal|python|node|full)
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  git_ssh_key: password
  git_token: password
  repositories:
    - url: str
      branch: str?
      path: str
  server_password: password
  workspace: str
slug: opencode
url: https://github.com/rezusnet/hassio-addons
version: "1.14.25"
