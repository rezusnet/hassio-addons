name: Feature Request
description: Suggest a feature for an addon
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like to see added?
    validations:
      required: true
  - type: input
    id: addon
    attributes:
      label: Which addon?
    validations:
      required: true
