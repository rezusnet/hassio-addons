name: Bug Report
description: Report a bug in an addon
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of the bug
    validations:
      required: true
  - type: input
    id: addon
    attributes:
      label: Which addon?
      description: Name of the addon with the issue
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Addon logs
      description: Paste relevant log output
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Addon configuration
      description: Your addon configuration (redact secrets)
      render: yaml
  - type: textarea
    id: system
    attributes:
      label: System information
      description: HA version, addon version, hardware, etc.
