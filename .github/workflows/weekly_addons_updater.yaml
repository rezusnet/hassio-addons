# yamllint disable rule:line-length
---
name: Weekly addons update
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_call:
  workflow_dispatch:

jobs:
  update-addons:
    if: github.repository_owner == 'rezusnet'
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install --break-system-packages lastversion 2>/dev/null || true
          if ! jq --version >/dev/null 2>&1; then
            wget -qO /tmp/jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-arm64
            sudo cp /tmp/jq /usr/local/bin/jq
            sudo chmod +x /usr/local/bin/jq
          fi
          if ! git --version >/dev/null 2>&1; then
            sudo apk add --no-cache git 2>/dev/null || sudo apt-get install -yqq git 2>/dev/null || true
          fi

      - name: Create options.json for bashio-standalone
        env:
          GITUSER: ${{ secrets.GH_BOT_USER }}
          GITAPI: ${{ secrets.GH_BOT_TOKEN }}
          REPOSITORY: rezusnet/hassio-addons
        run: |
          set -euo pipefail
          cat > /tmp/updater-options.json << OPTSEOF
          {"repository":"${REPOSITORY}","gituser":"${GITUSER}","gitapi":"${GITAPI}","gitmail":"${GITUSER}@users.noreply.github.com","dry_run":false,"verbose":true,"date_iso8601":true,"env_vars":[]}
          OPTSEOF
          echo "STANDALONE_OPTIONS_JSON=/tmp/updater-options.json" >> "$GITHUB_ENV"

      - name: Run updater script
        env:
          STANDALONE_OPTIONS_JSON: /tmp/updater-options.json
        run: |
          set -euo pipefail
          chmod +x ./addons_updater/rootfs/etc/cont-init.d/99-run.sh
          bash ./addons_updater/rootfs/etc/cont-init.d/99-run.sh

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/repo /tmp/updater-options.json
