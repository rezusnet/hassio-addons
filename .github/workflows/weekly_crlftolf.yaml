name: Fix CRLF Endings
on: 
  workflow_call:
  workflow_dispatch:
  
jobs:
  fix-crlf:
    if: github.repository_owner == 'rezusnet'
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Find and fix CRLF endings
        run: |
          set -euo pipefail
          FOUND=0
          while IFS= read -r -d '' file; do
            if grep -Plq '\r\n' "$file"; then
              echo "Fixing CRLF in $file"
              perl -i -pe 's/\r\n/\n/g' "$file"
              FOUND=1
            fi
          done < <(find . -type f ! -path "./.git/*" ! -name "*.png" ! -name "*.jpg" ! -name "*.bin" -print0)

          if [ "$FOUND" -eq 0 ]; then
            echo "No CRLF endings found"
          fi

      - name: Commit if needed
        uses: EndBug/add-and-commit@v10
        with:
          message: "Github bot: CRLF corrected"
          default_author: github_actions
