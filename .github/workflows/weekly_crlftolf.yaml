name: Fix CRLF Endings
on: 
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-crlf:
    if: github.repository_owner == 'rezusnet'
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Find and fix CRLF endings
        run: |
          set -euo pipefail
          FOUND=0
          while IFS= read -r -d '' file; do
            if grep -Plq '\r\n' "$file"; then
              echo "Fixing CRLF in $file"
              sed -i 's/\r$//' "$file"
              FOUND=1
            fi
          done < <(find . -type f ! -path "./.git/*" ! -name "*.png" ! -name "*.jpg" ! -name "*.bin" -print0)

          if [ "$FOUND" -eq 0 ]; then
            echo "No CRLF endings found"
          fi

      - name: Commit if needed
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
        with:
          message: "Github bot: CRLF corrected"
          default_author: github_actions
