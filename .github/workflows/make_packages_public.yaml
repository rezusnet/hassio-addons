name: Make packages public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  publish-packages:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Set all addon packages to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PACKAGES=(
            "opencode-aarch64"
            "opencode-amd64"
            "filebrowser-aarch64"
            "filebrowser-amd64"
            "addons_updater-aarch64"
            "addons_updater-amd64"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "Setting $pkg to public..."
            gh api --method PATCH \
              "/user/packages/container/$pkg" \
              -f visibility=public 2>/dev/null && echo "  -> OK (user)" && continue
            gh api --method PATCH \
              "/orgs/rezusnet/packages/container/$pkg" \
              -f visibility=public 2>/dev/null && echo "  -> OK (org)" && continue
            echo "  -> FAILED"
          done
