# yamllint disable rule:line-length
---
name: Builder

on:
  workflow_call:
    inputs:
      addon:
        description: "Specific addon to build (empty = detect from git diff)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      addon:
        description: "Specific addon to build (empty = detect from git diff)"
        required: false
        type: string
        default: ""
  push:
    branches:
      - master
    paths:
      - "**/config.*"

jobs:
  detect-changed-addons:
    if: >-
      ${{
        github.repository_owner == 'rezusnet' &&
        (github.event_name != 'push' || !contains(github.event.head_commit.message, 'nobuild'))
      }}
    runs-on: [self-hosted, linux, arm64]
    outputs:
      changedAddons: ${{ steps.find_addons.outputs.changed_addons }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find add-on directories to process
        id: find_addons
        run: |
          set -euo pipefail

          ADDON_INPUT="${{ inputs.addon }}"

          if [ -n "$ADDON_INPUT" ]; then
            echo "Addon specified via input: $ADDON_INPUT"
            changed_addons=$(echo "$ADDON_INPUT" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              git fetch --no-tags --depth=1 origin "$before" || true
              changed_config_files=$(git diff --name-only "$before" "${{ github.sha }}" | grep -E '^[^/]+/config\.(json|ya?ml)$' || true)
            else
              changed_config_files=$(git diff-tree --root --no-commit-id --name-only -r "${{ github.sha }}" | grep -E '^[^/]+/config\.(json|ya?ml)$' || true)
            fi
            echo "Changed config files:"
            printf '%s\n' "$changed_config_files"
            changed_addons=$(printf '%s\n' "$changed_config_files" | awk -F/ 'NF { print $1 }' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            echo "No addon specified and not a push event. Nothing to build."
            changed_addons="[]"
          fi

          echo "Changed add-ons: $changed_addons"
          echo "changed_addons=${changed_addons:-[]}" >> "$GITHUB_OUTPUT"

  prebuild-sanitize:
    if: ${{ needs.detect-changed-addons.outputs.changedAddons != '' && needs.detect-changed-addons.outputs.changedAddons != '[]' }}
    needs: detect-changed-addons
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sanitize text files and script permissions
        env:
          ADDONS_JSON: ${{ needs.detect-changed-addons.outputs.changedAddons }}
        run: |
          set -euo pipefail

          SKIP_EXTS='png jpg jpeg gif ico svg webp bmp tiff tif woff woff2 ttf eot otf mp3 mp4 avi mkv mov webm flac ogg wav zip tar gz bz2 xz zst 7z rar deb rpm apk jar class so o pyc db sqlite sqlite3'

          is_text_file() {
            local f="$1" ext
            ext="${f##*.}"
            ext="${ext,,}"
            for skip in $SKIP_EXTS; do
              [[ "$ext" == "$skip" ]] && return 1
            done
            return 0
          }

          mapfile -t addons < <(jq -r '.[]' <<<"$ADDONS_JSON")

          for addon in "${addons[@]}"; do
            echo "Sanitizing ${addon}"
            cd "$GITHUB_WORKSPACE/$addon"

            while IFS= read -r -d '' file; do
              is_text_file "$file" || continue
              sed -i 's/\r$//' "$file"
            done < <(find . -type f -print0)

            find . -type f -iname '*.sh' -exec chmod u+x {} \;
          done

      - name: Assert no mixed CRLF/LF remain
        env:
          ADDONS_JSON: ${{ needs.detect-changed-addons.outputs.changedAddons }}
        run: |
          set -euo pipefail
          mapfile -t addons < <(jq -r '.[]' <<<"$ADDONS_JSON")
          found=0
          for addon in "${addons[@]}"; do
            while IFS= read -r -d '' file; do
              if grep -Plq '\r\n' "$file"; then
                echo "::warning file=$file::Mixed CRLF/LF line endings detected"
                found=1
              fi
            done < <(find "$GITHUB_WORKSPACE/$addon" -type f -name '*.sh' -print0 -o -name '*.yaml' -print0 -o -name '*.yml' -print0 -o -name '*.json' -print0 -o -name '*.md' -print0 -o -name '*.txt' -print0 -o -name '*.cfg' -print0 -o -name '*.conf' -print0 -o -name '*.py' -print0)
          done
          if [ "$found" -eq 1 ]; then
            echo "::error::Mixed line endings found, fix before proceeding"
            exit 1
          fi

      - name: Commit sanitize changes
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: EndBug/add-and-commit@v10
        with:
          commit: -u
          message: "GitHub bot: sanitize (spaces + LF endings) & chmod [nobuild]"
          default_author: github_actions
          pull: --rebase --autostash
          fetch: --tags --force

  lint_config:
    if: ${{ needs.detect-changed-addons.outputs.changedAddons != '' && needs.detect-changed-addons.outputs.changedAddons != '[]' }}
    needs: [detect-changed-addons, prebuild-sanitize]
    runs-on: [self-hosted, linux, arm64]
    continue-on-error: true
    strategy:
      matrix:
        addon: ${{ fromJSON(needs.detect-changed-addons.outputs.changedAddons) }}
    steps:
      - uses: actions/checkout@v6
      - name: Run Home Assistant Add-on Lint
        shell: bash
        run: |
          set -euo pipefail
          ADDON="${{ matrix.addon }}"
          echo "Linting addon: $ADDON"

          CONFIG=""
          for f in config.yaml config.yml config.json; do
            if [ -f "$ADDON/$f" ]; then
              CONFIG="$ADDON/$f"
              break
            fi
          done

          if [ -z "$CONFIG" ]; then
            echo "::error::No config file found in $ADDON"
            exit 1
          fi

          echo "Config file: $CONFIG"

          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          addon = "${{ matrix.addon }}"
          addon_dir = Path(addon)

          def load_config():
              for name in ["config.yaml", "config.yml", "config.json"]:
                  p = addon_dir / name
                  if p.exists():
                      text = p.read_text()
                      if p.suffix == ".json":
                          return json.loads(text)
                      import yaml
                      return yaml.safe_load(text) or {}
              return {}

          config = load_config()
          errors = []

          for field in ["name", "description", "version", "slug", "arch"]:
              if field not in config:
                  errors.append(f"Missing required field: {field}")

          if "arch" in config and not isinstance(config["arch"], list):
              errors.append("arch must be a list")

          if "image" in config and "{arch}" not in str(config["image"]):
              errors.append("image must contain {arch} placeholder")

          if "options" in config and "schema" not in config:
              errors.append("schema is required when options is defined")

          if not (addon_dir / "Dockerfile").exists():
              errors.append("Dockerfile is missing")

          for e in errors:
              print(f"::error::{e}")

          if errors:
              sys.exit(1)

          print(f"Lint passed for {addon}")
          PY

  build:
    if: ${{ needs.detect-changed-addons.outputs.changedAddons != '' && needs.detect-changed-addons.outputs.changedAddons != '[]' }}
    needs: [detect-changed-addons, lint_config]
    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.detect-changed-addons.outputs.changedAddons) }}
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            runner: ["self-hosted", "linux", "x64"]
          - arch: aarch64
            runner: ["self-hosted", "linux", "arm64"]
    steps:
      - name: Clean stale workspace
        run: |
          WS="${{ github.workspace }}"
          if [ -d "$WS/.git" ]; then
            cd "$WS"
            git submodule deinit --all -f 2>/dev/null || true
            rm -rf .git/modules 2>/dev/null || true
          fi
          sudo rm -rf "$WS/super-linter-output" 2>/dev/null || true

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve symlinks in repository copy
        run: |
          set -euo pipefail
          find . -type l | while read -r link; do
            target=$(readlink -f "$link" || true)
            if [ -z "$target" ]; then
              echo "Skipping broken symlink: $link"
              continue
            fi
            rm "$link"
            if [ -d "$target" ]; then
              mkdir -p "$link"
              cp -a "$target/." "$link/"
            else
              cp "$target" "$link"
            fi
          done

      - name: Copy templates into addon build context
        env:
          ADDON: ${{ matrix.addon }}
        run: |
          set -euo pipefail
          TEMPLATES_DIR=".templates"
          ADDON_DIR="./$ADDON"

          for script in ha_automodules.sh ha_autoapps.sh ha_entrypoint.sh bashio-standalone.sh ha_lsio.sh; do
            if [ -f "$TEMPLATES_DIR/$script" ]; then
              cp "$TEMPLATES_DIR/$script" "$ADDON_DIR/$script"
            fi
          done

      - name: Install PyYAML
        run: |
          if python3 -c "import yaml" 2>/dev/null; then
            echo "PyYAML already available"
          elif python3 -m pip --version >/dev/null 2>&1; then
            python3 -m pip install --disable-pip-version-check --break-system-packages pyyaml
          elif command -v pacman >/dev/null 2>&1; then
            sudo pacman -S --noconfirm python-pyyaml
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -yqq python3-yaml
          else
            echo "ERROR: Cannot install PyYAML" >&2
            exit 1
          fi

      - name: Read add-on metadata
        id: info
        env:
          ADDON: ${{ matrix.addon }}
          ARCH: ${{ matrix.arch }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import yaml

          addon = os.environ["ADDON"]
          arch = os.environ["ARCH"]
          repository = os.environ["REPOSITORY"]
          github_sha = os.environ["GITHUB_SHA_VALUE"]
          addon_dir = Path(addon)
          output_path = Path(os.environ["GITHUB_OUTPUT"])

          def load_file(path: Path):
              text = path.read_text(encoding="utf-8")
              if path.suffix == ".json":
                  return json.loads(text)
              return yaml.safe_load(text) or {}

          def first_existing(*names: str):
              for name in names:
                  path = addon_dir / name
                  if path.exists():
                      return path
              return None

          config_path = first_existing("config.json", "config.yaml", "config.yml")
          if config_path is None:
              raise SystemExit(f"No config file found in {addon}")

          build_path = first_existing("build.json", "build.yaml", "build.yml")
          config = load_file(config_path)
          build = load_file(build_path) if build_path else {}

          build_from_map = build.get("build_from") or {}
          arch_list = list(build_from_map.keys()) if build_from_map else list(config.get("arch") or [])
          build_arch = arch in arch_list

          image_raw = str(config.get("image") or "").strip()
          image = image_raw.replace("{arch}", arch)
          version = str(config.get("version") or "").strip()
          name = str(config.get("name") or "").strip()
          description = str(config.get("description") or "").strip()
          url = str(config.get("url") or "").strip()
          build_from = str(build_from_map.get(arch) or "").strip()
          build_date = datetime.now(timezone.utc).replace(microsecond=0).isoformat()

          dockerfile = addon_dir / f"Dockerfile.{arch}"
          if dockerfile.exists():
              dockerfile_path = str(dockerfile)
              has_dockerfile = True
          else:
              dockerfile = addon_dir / "Dockerfile"
              dockerfile_path = str(dockerfile)
              has_dockerfile = dockerfile.exists()

          labels = [
              f"io.hass.name={name}",
              f"io.hass.description={description}",
              "io.hass.type=addon",
          ]
          if url:
              labels.append(f"io.hass.url={url}")

          build_args = [
              f"BUILD_ARCH={arch}",
              f"BUILD_VERSION={version}",
              f"BUILD_DATE={build_date}",
              f"BUILD_DESCRIPTION={description}",
              f"BUILD_NAME={name}",
              f"BUILD_REF={github_sha}",
              f"BUILD_REPOSITORY={repository}",
          ]
          if build_from:
              build_args.insert(2, f"BUILD_FROM={build_from}")

          def write_output(key: str, value: str):
              with output_path.open("a", encoding="utf-8") as fh:
                  print(f"{key}<<__EOF__", file=fh)
                  print(value, file=fh)
                  print("__EOF__", file=fh)

          write_output("architectures", json.dumps(arch_list))
          write_output("build_arch", "true" if build_arch else "false")
          write_output("has_dockerfile", "true" if has_dockerfile else "false")
          write_output("dockerfile", dockerfile_path)
          write_output("image", image)
          write_output("version", version)
          write_output("name", name)
          write_output("description", description)
          write_output("url", url)
          write_output("build_from", build_from)
          write_output("build_date", build_date)
          write_output("labels", "\n".join(labels))
          write_output("build_args", "\n".join(build_args))
          PY

      - name: Explain skipped builds
        if: steps.info.outputs.build_arch != 'true' || steps.info.outputs.has_dockerfile != 'true'
        run: |
          if [ "${{ steps.info.outputs.has_dockerfile }}" != 'true' ]; then
            echo "No Dockerfile found in ${{ matrix.addon }}, skipping build."
          elif [ "${{ steps.info.outputs.build_arch }}" != 'true' ]; then
            echo "${{ matrix.arch }} is not a valid architecture for ${{ matrix.addon }}, skipping build."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.addon }} add-on
        if: steps.info.outputs.build_arch == 'true' && steps.info.outputs.has_dockerfile == 'true'
        run: |
          set -euo pipefail

          IMAGE="${{ steps.info.outputs.image }}"
          VERSION="${{ steps.info.outputs.version }}"
          DOCKERFILE="${{ steps.info.outputs.dockerfile }}"
          CONTEXT="./${{ matrix.addon }}"
          LABELS="${{ steps.info.outputs.labels }}"
          BUILD_ARGS="${{ steps.info.outputs.build_args }}"

          LABEL_FLAGS=()
          while IFS= read -r label; do
            [ -n "$label" ] && LABEL_FLAGS+=("--label" "$label")
          done <<< "$LABELS"

          BUILD_ARG_FLAGS=()
          while IFS= read -r arg; do
            [ -n "$arg" ] && BUILD_ARG_FLAGS+=("--build-arg" "$arg")
          done <<< "$BUILD_ARGS"

          ARCH="${{ matrix.arch }}"
          if [ "$ARCH" = "amd64" ]; then
            PLATFORM="linux/amd64"
          else
            PLATFORM="linux/arm64"
          fi

          echo "Building $IMAGE:$VERSION for $PLATFORM on native runner"
          docker buildx build \
            --platform "$PLATFORM" \
            --file "$DOCKERFILE" \
            --tag "$IMAGE:$VERSION" \
            --tag "$IMAGE:latest" \
            "${LABEL_FLAGS[@]}" \
            "${BUILD_ARG_FLAGS[@]}" \
            --push \
            "$CONTEXT"

      - name: Ensure package is public
        if: steps.info.outputs.build_arch == 'true' && steps.info.outputs.has_dockerfile == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE="${{ steps.info.outputs.image }}"
          PKG_NAME=$(echo "$IMAGE" | sed 's|ghcr.io/||' | sed 's|/|-|g')
          echo "Setting package $PKG_NAME to public..."
          gh api --method PATCH \
            "/user/packages/container/$PKG_NAME" \
            -f visibility=public 2>/dev/null || \
          gh api --method PATCH \
            "/orgs/rezusnet/packages/container/$PKG_NAME" \
            -f visibility=public 2>/dev/null || \
          echo "WARNING: Could not set package visibility. Ensure GITHUB_TOKEN has write:packages scope."

  integration-test:
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/master' &&
        needs.detect-changed-addons.outputs.changedAddons != '' &&
        needs.detect-changed-addons.outputs.changedAddons != '[]'
      }}
    needs: [detect-changed-addons, build]
    runs-on: ${{ matrix.runner }}
    name: Integration test ${{ matrix.addon }}
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.detect-changed-addons.outputs.changedAddons) }}
        include:
          - arch: amd64
            runner: ["self-hosted", "linux", "x64"]
          - arch: aarch64
            runner: ["self-hosted", "linux", "arm64"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PyYAML
        run: |
          if python3 -c "import yaml" 2>/dev/null; then
            echo "PyYAML already available"
          elif python3 -m pip --version >/dev/null 2>&1; then
            python3 -m pip install --disable-pip-version-check --break-system-packages pyyaml
          elif command -v pacman >/dev/null 2>&1; then
            sudo pacman -S --noconfirm python-pyyaml
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -yqq python3-yaml
          else
            echo "ERROR: Cannot install PyYAML" >&2
            exit 1
          fi

      - name: Read addon metadata
        id: info
        env:
          ADDON: ${{ matrix.addon }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          import yaml

          addon = os.environ["ADDON"]
          addon_dir = Path(addon)
          output_path = Path(os.environ["GITHUB_OUTPUT"])

          def load_config():
              for name in ["config.yaml", "config.yml", "config.json"]:
                  p = addon_dir / name
                  if p.exists():
                      text = p.read_text()
                      if p.suffix == ".json":
                          return json.loads(text)
                      return yaml.safe_load(text) or {}
              return {}

          config = load_config()
          options = config.get("options", {})
          image_raw = str(config.get("image", ""))
          arch = "${{ matrix.arch }}"
          image = image_raw.replace("{arch}", arch)
          version = str(config.get("version", ""))

          health_port = ""
          for p in config.get("ports", {}):
              health_port = str(p).split("/")[0]
              break

          has_ingress = config.get("ingress", False)
          ingress_port = str(config.get("ingress_port", ""))
          ingress_stream = config.get("ingress_stream", False)

          maps = config.get("map", [])
          devices = config.get("devices", [])
          privileged = config.get("privileged", [])
          host_network = config.get("host_network", False)
          host_dbus = config.get("host_dbus", False)
          udev = config.get("udev", False)
          env_vars = config.get("environment", {})

          with output_path.open("a") as f:
              f.write(f"image={image}:{version}\n")
              f.write(f"version={version}\n")
              f.write(f"health_port={health_port}\n")
              f.write(f"has_ingress={str(has_ingress).lower()}\n")
              f.write(f"ingress_port={ingress_port}\n")
              f.write(f"host_network={str(host_network).lower()}\n")
              f.write(f"host_dbus={str(host_dbus).lower()}\n")
              f.write(f"udev={str(udev).lower()}\n")
              f.write(f"options_json={json.dumps(options)}\n")
              f.write(f"maps_json={json.dumps(maps)}\n")
              f.write(f"devices_json={json.dumps(devices)}\n")
              f.write(f"privileged_json={json.dumps(privileged)}\n")
              f.write(f"env_vars_json={json.dumps(env_vars)}\n")
          PY

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        run: docker pull "${{ steps.info.outputs.image }}"

      - name: Run integration test
        run: |
          set -euo pipefail
          ADDON="${{ matrix.addon }}"
          IMAGE="${{ steps.info.outputs.image }}"
          HEALTH_PORT="${{ steps.info.outputs.health_port }}"
          HOST_NETWORK="${{ steps.info.outputs.host_network }}"
          HOST_DBUS="${{ steps.info.outputs.host_dbus }}"
          UDEV="${{ steps.info.outputs.udev }}"
          OPTIONS_JSON='${{ steps.info.outputs.options_json }}'
          MAPS_JSON='${{ steps.info.outputs.maps_json }}'
          DEVICES_JSON='${{ steps.info.outputs.devices_json }}'
          PRIVILEGED_JSON='${{ steps.info.outputs.privileged_json }}'
          ENV_VARS_JSON='${{ steps.info.outputs.env_vars_json }}'

          echo "=== Integration test for ${ADDON} ==="
          echo "Image: ${IMAGE}"
          echo "Health port: ${HEALTH_PORT}"
          echo "Host network: ${HOST_NETWORK}"
          echo "Host DBus: ${HOST_DBUS}"
          echo "Udev: ${UDEV}"
          echo "Privileged caps: ${PRIVILEGED_JSON}"
          echo "Maps: ${MAPS_JSON}"
          echo "Devices: ${DEVICES_JSON}"

          TEST_DIR="/tmp/inttest-${ADDON}-$$"
          mkdir -p "${TEST_DIR}/data" \
                    "${TEST_DIR}/share" \
                    "${TEST_DIR}/media" \
                    "${TEST_DIR}/ssl" \
                    "${TEST_DIR}/addon_configs/${ADDON}" \
                    "${TEST_DIR}/backup"

          echo "${OPTIONS_JSON}" > "${TEST_DIR}/data/options.json"

          cleanup() {
            echo "Cleaning up..."
            docker rm -f "inttest-${ADDON}" 2>/dev/null || true
            rm -rf "${TEST_DIR}" 2>/dev/null || true
          }
          trap cleanup EXIT

          RUN_ARGS=("--name" "inttest-${ADDON}")

          # --- Network ---
          if [ "${HOST_NETWORK}" = "true" ]; then
            RUN_ARGS+=("--network" "host")
          elif [ -n "${HEALTH_PORT}" ]; then
            RUN_ARGS+=("-p" "${HEALTH_PORT}:${HEALTH_PORT}")
          fi

          # --- Capabilities from privileged field ---
          CAP_MAP_SYS_ADMIN="SYS_ADMIN"
          CAP_MAP_DAC_READ_SEARCH="DAC_READ_SEARCH"
          CAP_MAP_NET_ADMIN="NET_ADMIN"
          CAP_MAP_NET_RAW="NET_RAW"
          CAP_MAP_SYS_PTRACE="SYS_PTRACE"
          CAP_MAP_SYS_RAWIO="SYS_RAWIO"
          CAP_MAP_SYS_MODULE="SYS_MODULE"
          CAP_MAP_AUDIT_WRITE="AUDIT_WRITE"
          CAP_MAP_KILL="KILL"
          HAS_CAPS=false
          while IFS= read -r cap; do
            [ -n "${cap}" ] || continue
            RUN_ARGS+=("--cap-add" "${cap}")
            HAS_CAPS=true
          done < <(echo "${PRIVILEGED_JSON}" | jq -r '.[] // empty' 2>/dev/null)

          # If no explicit capabilities declared, grant none
          # (Supervisor only grants what is declared)
          echo "Capabilities: $(if [ "${HAS_CAPS}" = "true" ]; then echo "from config"; else echo "none declared"; fi)"

          # --- Volume mounts from map ---
          RUN_ARGS+=("-v" "${TEST_DIR}/data:/data:rw")

          while IFS= read -r entry; do
            [ -n "${entry}" ] || continue
            map_name=$(echo "${entry}" | cut -d: -f1)
            map_mode=$(echo "${entry}" | cut -d: -f2 -s)
            [ -z "${map_mode}" ] && map_mode="rw"
            case "${map_name}" in
              addon_config)
                RUN_ARGS+=("-v" "${TEST_DIR}/addon_configs/${ADDON}:/addon_configs/${ADDON}:${map_mode}")
                ;;
              media)
                RUN_ARGS+=("-v" "${TEST_DIR}/media:/media:${map_mode}")
                ;;
              share)
                RUN_ARGS+=("-v" "${TEST_DIR}/share:/share:${map_mode}")
                ;;
              ssl)
                RUN_ARGS+=("-v" "${TEST_DIR}/ssl:/ssl:${map_mode}")
                ;;
              backup)
                RUN_ARGS+=("-v" "${TEST_DIR}/backup:/backup:${map_mode}")
                ;;
              homeassistant_config)
                echo "  Note: homeassistant_config map skipped in CI"
                ;;
              *)
                echo "  Warning: unknown map '${map_name}' skipped"
                ;;
            esac
          done < <(echo "${MAPS_JSON}" | jq -r '.[] // empty' 2>/dev/null)

          # --- Devices ---
          while IFS= read -r dev; do
            [ -n "${dev}" ] || continue
            if [ -e "${dev}" ]; then
              RUN_ARGS+=("--device" "${dev}")
            else
              echo "  Note: device ${dev} not present on runner, skipping"
            fi
          done < <(echo "${DEVICES_JSON}" | jq -r '.[] // empty' 2>/dev/null)

          # --- Environment variables ---
          while IFS= read -r envline; do
            [ -n "${envline}" ] || continue
            RUN_ARGS+=("-e" "${envline}")
          done < <(echo "${ENV_VARS_JSON}" | jq -r 'to_entries[] | "\(.key)=\(.value)"' 2>/dev/null)

          # --- Host DBus ---
          if [ "${HOST_DBUS}" = "true" ] && [ -e /run/dbus ]; then
            RUN_ARGS+=("-v" "/run/dbus:/run/dbus:ro")
            echo "  Mounting host D-Bus"
          fi

          # --- Udev ---
          if [ "${UDEV}" = "true" ] && [ -e /run/udev ]; then
            RUN_ARGS+=("-v" "/run/udev:/run/udev:ro")
            echo "  Mounting host udev"
          fi

          echo ""
          echo "Starting container with $(echo "${RUN_ARGS[@]}" | wc -w) args..."
          docker run -d "${RUN_ARGS[@]}" "${IMAGE}"

          echo "Waiting for startup (max 120s)..."
          MAX_WAIT=24
          HEALTHY=false
          for i in $(seq 1 $MAX_WAIT); do
            if ! docker ps --filter "name=inttest-${ADDON}" --format '{{.Names}}' | grep -q "inttest-${ADDON}"; then
              EXIT_CODE=$(docker inspect "inttest-${ADDON}" --format='{{.State.ExitCode}}' 2>/dev/null || echo "unknown")
              echo "::error::Container exited with code ${EXIT_CODE} after $((i * 5))s"
              echo "=== Container logs ==="
              docker logs "inttest-${ADDON}" 2>&1 || true
              exit 1
            fi

            if [ -n "${HEALTH_PORT}" ]; then
              HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://127.0.0.1:${HEALTH_PORT}/" 2>/dev/null || echo "000")
              if [ "${HTTP_CODE}" != "000" ]; then
                echo "Health check PASSED (HTTP ${HTTP_CODE}) after $((i * 5))s"
                HEALTHY=true
                break
              fi
            fi

            echo "  Waiting... ($((i * 5))s)"
            sleep 5
          done

          echo ""
          echo "=== Container logs ==="
          docker logs "inttest-${ADDON}" 2>&1 || true

          # --- Mount assertions ---
          echo ""
          echo "=== Mount point assertions ==="
          PASS=true
          for mp in /data; do
            if docker exec "inttest-${ADDON}" test -d "${mp}" 2>/dev/null; then
              echo "  OK: ${mp} exists"
            else
              echo "  FAIL: ${mp} not found in container"
              PASS=false
            fi
          done

          while IFS= read -r entry; do
            [ -n "${entry}" ] || continue
            map_name=$(echo "${entry}" | cut -d: -f1)
            case "${map_name}" in
              addon_config) docker exec "inttest-${ADDON}" test -d "/addon_configs/${ADDON}" 2>/dev/null && echo "  OK: /addon_configs/${ADDON} exists" || { echo "  FAIL: /addon_configs/${ADDON} not found"; PASS=false; } ;;
              media) docker exec "inttest-${ADDON}" test -d "/media" 2>/dev/null && echo "  OK: /media exists" || { echo "  FAIL: /media not found"; PASS=false; } ;;
              share) docker exec "inttest-${ADDON}" test -d "/share" 2>/dev/null && echo "  OK: /share exists" || { echo "  FAIL: /share not found"; PASS=false; } ;;
              ssl) docker exec "inttest-${ADDON}" test -d "/ssl" 2>/dev/null && echo "  OK: /ssl exists" || { echo "  FAIL: /ssl not found"; PASS=false; } ;;
              backup) docker exec "inttest-${ADDON}" test -d "/backup" 2>/dev/null && echo "  OK: /backup exists" || { echo "  FAIL: /backup not found"; PASS=false; } ;;
            esac
          done < <(echo "${MAPS_JSON}" | jq -r '.[] // empty' 2>/dev/null)

          if [ "${PASS}" != "true" ]; then
            echo "::warning::Some mount assertions failed"
          fi

          if [ "${HEALTHY}" = "true" ]; then
            echo ""
            echo "Stability check: waiting 15s to ensure container stays up..."
            sleep 15
            if ! docker ps --filter "name=inttest-${ADDON}" --format '{{.Names}}' | grep -q "inttest-${ADDON}"; then
              echo "::error::Container crashed during stability check"
              docker logs "inttest-${ADDON}" --tail 50 2>&1 || true
              exit 1
            fi
            echo "Integration test PASSED for ${ADDON}"
          elif [ -z "${HEALTH_PORT}" ]; then
            if docker ps --filter "name=inttest-${ADDON}" --format '{{.Names}}' | grep -q "inttest-${ADDON}"; then
              echo "Integration test PASSED for ${ADDON} (running, no health endpoint)"
            else
              echo "::error::Container is not running"
              exit 1
            fi
          else
            echo "::error::Health check FAILED after 120s"
            exit 1
          fi
          exit 0

  make-changelog:
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/master' &&
        needs.detect-changed-addons.outputs.changedAddons != '' &&
        needs.detect-changed-addons.outputs.changedAddons != '[]'
      }}
    needs: [detect-changed-addons, build]
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update changelog
        env:
          ADDONS_JSON: ${{ needs.detect-changed-addons.outputs.changedAddons }}
        run: |
          set -euo pipefail

          mapfile -t addons < <(jq -r '.[]' <<<"$ADDONS_JSON")

          for addon in "${addons[@]}"; do
            echo "Updating changelog for ${addon}"
            cd "$GITHUB_WORKSPACE/$addon"

            if [ -f config.yaml ]; then
              version=$(sed -n 's/^version:[[:space:]]*//p' config.yaml | head -n 1)
            elif [ -f config.yml ]; then
              version=$(sed -n 's/^version:[[:space:]]*//p' config.yml | head -n 1)
            elif [ -f config.json ]; then
              version=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' config.json | head -n 1)
            else
              echo "No config file found in ${addon}" >&2
              exit 1
            fi

            version=${version//\"/}
            version=${version//\'/}
            version=$(echo "$version" | xargs)

            if [[ "$version" == *test* ]]; then
              continue
            fi

            touch CHANGELOG.md
            if ! grep -q "^## ${version} (" CHANGELOG.md; then
              first_line=$(sed -n '/./p' CHANGELOG.md | head -n 1 || true)
              if [[ -n "$first_line" && "$first_line" != -* ]]; then
                sed -i '1i\- Minor bugs fixed' CHANGELOG.md
              elif [[ -z "$first_line" ]]; then
                printf '%s\n' '- Minor bugs fixed' > CHANGELOG.md
              fi
              sed -i "1i\## ${version} ($(date '+%d-%m-%Y'))" CHANGELOG.md
            fi
          done

      - name: Commit changelog changes
        uses: EndBug/add-and-commit@v10
        with:
          commit: -u
          message: "GitHub bot: changelog [nobuild]"
          default_author: github_actions
          pull: --rebase --autostash
          fetch: --force
          push: --force

  revert-on-failure:
    if: >-
      ${{
        failure() &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/master' &&
        github.repository_owner == 'rezusnet'
      }}
    needs:
      [
        detect-changed-addons,
        prebuild-sanitize,
        lint_config,
        build,
        integration-test,
      ]
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Revert commits from this failed push
        run: |
          set -euo pipefail

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin
          git checkout master
          git pull --ff-only origin master

          before="${{ github.event.before }}"
          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
            mapfile -t commits < <(git rev-list "${before}..HEAD")
          else
            commits=("${{ github.sha }}")
          fi

          if [ "${#commits[@]}" -eq 0 ]; then
            echo "Nothing to revert."
            exit 0
          fi

          for commit in "${commits[@]}"; do
            git revert --no-edit "$commit"
          done

          git push origin HEAD:master
