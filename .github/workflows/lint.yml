name: Lint workflows

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/config.*"
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Super-Linter (changed files)
        uses: github/super-linter/slim@v7
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_BASH: true
          VALIDATE_BASH_EXEC: true
          VALIDATE_SHELL_SHFMT: true
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_MARKDOWN: true
          VALIDATE_GITLEAKS: true
          VALIDATE_JSCPD: true
          VALIDATE_JSON: true
          VALIDATE_YAML: true
          VALIDATE_CHECKOV: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_NATURAL_LANGUAGE: false
          FILTER_REGEX_EXCLUDE: '.*[.]github/workflows/.*'

  lint-changes:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set diff range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DIFF_RANGE=${{ github.event.pull_request.base.sha }}...${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "DIFF_RANGE=${{ github.event.before }}...${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Fix Unicode spaces in changed files
        run: |
          set -euo pipefail
          CHANGED_FILES=$(git diff --name-only "$DIFF_RANGE")
          UNICODE_SPACES_REGEX=$'[\u00A0\u2002\u2003\u2007\u2008\u2009\u202F\u205F\u3000\u200B]'
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              MIME_TYPE=$(file --mime-type -b "$file")
              if [[ "$MIME_TYPE" == text/* ]]; then
                perl -CSD -pe "s/$UNICODE_SPACES_REGEX/ /g" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
              fi
            fi
          done

      - name: Install linting tools
        run: |
          if ! shellcheck --version >/dev/null 2>&1; then
            wget -qO /tmp/shellcheck.tar.xz https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.aarch64.tar.xz
            tar -xJf /tmp/shellcheck.tar.xz -C /tmp shellcheck-v0.10.0/shellcheck
            sudo cp /tmp/shellcheck-v0.10.0/shellcheck /usr/local/bin/shellcheck
            sudo chmod +x /usr/local/bin/shellcheck
          fi
          if ! hadolint --version >/dev/null 2>&1; then
            wget -qO /tmp/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-arm64
            sudo cp /tmp/hadolint /usr/local/bin/hadolint
            sudo chmod +x /usr/local/bin/hadolint
          fi
          if ! shfmt --version >/dev/null 2>&1; then
            wget -qO /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_arm64
            sudo cp /tmp/shfmt /usr/local/bin/shfmt
            sudo chmod +x /usr/local/bin/shfmt
          fi

      - name: Lint changed shell scripts
        run: |
          set -euo pipefail
          CHANGED_SH=$(git diff --name-only "$DIFF_RANGE" | grep -E '\.(sh)$|(^|/)run$' || true)
          for f in $CHANGED_SH; do
            if [ -f "$f" ]; then
              if ! shellcheck -x -s bash "$f" 2>&1; then
                echo "::error file=$f::shellcheck found issues"
              fi
            fi
          done
          echo "Shellcheck done"

      - name: Lint changed Dockerfiles
        run: |
          set -euo pipefail
          CHANGED_DF=$(git diff --name-only "$DIFF_RANGE" | grep -iE '(^|/)Dockerfile' || true)
          for f in $CHANGED_DF; do
            if [ -f "$f" ]; then
              if ! hadolint "$f" 2>&1; then
                echo "::warning file=$f::hadolint found issues"
              fi
            fi
          done
          echo "Hadolint done"

      - name: Format changed shell scripts
        run: |
          CHANGED_SH=$(git diff --name-only "$DIFF_RANGE" | grep -E '\.(sh)$|(^|/)run$' || true)
          for f in $CHANGED_SH; do
            if [ -f "$f" ]; then
              shfmt -w -i 4 -ci -bn -sr "$f"
            fi
          done

      - name: Restore executable permissions
        run: |
          CHANGED_SH=$(git diff --name-only "$DIFF_RANGE" | grep -E '\.(sh)$|(^|/)run$' || true)
          for f in $CHANGED_SH; do
            [ -f "$f" ] && chmod +x "$f"
          done

  lint-autofix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fix Unicode spaces in all text files
        run: |
          set -euo pipefail
          UNICODE_SPACES_REGEX=$'[\u00A0\u2002\u2003\u2007\u2008\u2009\u202F\u205F\u3000\u200B]'
          find . -type f ! -path "./.git/*" | while read -r file; do
            MIME_TYPE=$(file --mime-type -b "$file")
            if [[ "$MIME_TYPE" == text/* ]]; then
              perl -CSD -pe "s/$UNICODE_SPACES_REGEX/ /g" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            fi
          done

      - name: Install linting tools
        run: |
          if ! shfmt --version >/dev/null 2>&1; then
            wget -qO /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_arm64
            sudo cp /tmp/shfmt /usr/local/bin/shfmt
            sudo chmod +x /usr/local/bin/shfmt
          fi

      - name: Format shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "run" \) ! -path "./.git/*" -exec shfmt -w -i 4 -ci -bn -sr {} +

      - name: Restore executable permissions
        run: find . -type f \( -name "*.sh" -o -name "run" \) -exec chmod +x {} \;

      - name: Check for changes
        id: changed
        run: |
          if ! git diff --quiet; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          title: "Github bot: fix linting issues"
          commit-message: "fix: auto-fix linting issues"
          branch-suffix: timestamp
