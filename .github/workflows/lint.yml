name: Lint workflows

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/config.*"
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-changes:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set diff range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DIFF_RANGE=${{ github.event.pull_request.base.sha }}...${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "DIFF_RANGE=${{ github.event.before }}...${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Fix Unicode spaces in changed files
        run: |
          set -euo pipefail
          CHANGED_FILES=$(git diff --name-only "$DIFF_RANGE")
          UNICODE_SPACES_REGEX=$'[\u00A0\u2002\u2003\u2007\u2008\u2009\u202F\u205F\u3000\u200B]'
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              MIME_TYPE=$(file --mime-type -b "$file")
              if [[ "$MIME_TYPE" == text/* ]]; then
                perl -CSD -pe "s/$UNICODE_SPACES_REGEX/ /g" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
              fi
            fi
          done

      - name: Install linting tools
        run: |
          command -v shellcheck >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -yqq shellcheck)
          command -v hadolint >/dev/null 2>&1 || (wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-arm64 && sudo chmod +x /usr/local/bin/hadolint)
          command -v shfmt >/dev/null 2>&1 || (wget -qO /usr/local/bin/shfmt https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_arm64 && sudo chmod +x /usr/local/bin/shfmt)

      - name: Lint shell scripts
        run: |
          set -euo pipefail
          RC=0
          find . -type f \( -name "*.sh" -o -name "run" \) ! -path "./.git/*" | while read -r f; do
            if ! shellcheck -x -s bash "$f" 2>&1; then
              echo "::error file=$f::shellcheck found issues"
            fi
          done
          echo "Shellcheck done"

      - name: Lint Dockerfiles
        run: |
          set -euo pipefail
          find . -name "Dockerfile*" ! -path "./.git/*" | while read -r f; do
            if ! hadolint "$f" 2>&1; then
              echo "::warning file=$f::hadolint found issues"
            fi
          done
          echo "Hadolint done"

      - name: Format shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "run" \) ! -path "./.git/*" -exec shfmt -w -i 4 -ci -bn -sr {} +

      - name: Restore executable permissions
        run: find . -type f \( -name "*.sh" -o -name "run" \) -exec chmod +x {} \;

  lint-autofix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fix Unicode spaces in all text files
        run: |
          set -euo pipefail
          UNICODE_SPACES_REGEX=$'[\u00A0\u2002\u2003\u2007\u2008\u2009\u202F\u205F\u3000\u200B]'
          find . -type f ! -path "./.git/*" | while read -r file; do
            MIME_TYPE=$(file --mime-type -b "$file")
            if [[ "$MIME_TYPE" == text/* ]]; then
              perl -CSD -pe "s/$UNICODE_SPACES_REGEX/ /g" "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            fi
          done

      - name: Install linting tools
        run: |
          command -v shfmt >/dev/null 2>&1 || (wget -qO /usr/local/bin/shfmt https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_arm64 && sudo chmod +x /usr/local/bin/shfmt)

      - name: Format shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "run" \) ! -path "./.git/*" -exec shfmt -w -i 4 -ci -bn -sr {} +

      - name: Restore executable permissions
        run: find . -type f \( -name "*.sh" -o -name "run" \) -exec chmod +x {} \;

      - name: Check for changes
        id: changed
        run: |
          if ! git diff --quiet; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "Github bot: fix linting issues"
          commit-message: "fix: auto-fix linting issues"
          branch-suffix: timestamp
