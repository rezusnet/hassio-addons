name: Lint workflows

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/config.*"
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  super-lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Super-Linter (changed files)
        uses: github/super-linter/slim@b807e99ddd37e444d189cfd2c2ca1274d8ae8ef1 # v7
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_JSCPD: false
          VALIDATE_CHECKOV: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_TYPESCRIPT_STANDARD: false
          VALIDATE_CPP: false
          VALIDATE_CLANG_FORMAT: false
          VALIDATE_GO: false
          VALIDATE_JAVA: false
          VALIDATE_RUST: false
          VALIDATE_RUBY: false
          VALIDATE_PHP: false
          VALIDATE_CSHARP: false
          VALIDATE_POWERSHELL: false
          VALIDATE_CSS: false
          VALIDATE_ENV: false
          VALIDATE_HTML: false
          VALIDATE_SQL: false
          VALIDATE_XML: false
          VALIDATE_ANSIBLE: false
          VALIDATE_TERRAFORM_TFLINT: false
          VALIDATE_TERRAFORM_TERRASCAN: false
          VALIDATE_KOTLIN: false
          VALIDATE_DART: false
          VALIDATE_RAKU: false
          VALIDATE_COFFEESCRIPT: false
          VALIDATE_PERL: false
          VALIDATE_SWIFT: false
          VALIDATE_SHELL_SHFMT: false
          FILTER_REGEX_EXCLUDE: ".*[.]github/(workflows|scripts)/.*"

  lint-changes:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set diff range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DIFF_RANGE=${{ github.event.pull_request.base.sha }}...${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "DIFF_RANGE=${{ github.event.before }}...${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Fix CRLF in changed files
        run: |
          set -euo pipefail
          CHANGED_FILES=$(git diff --name-only "$DIFF_RANGE")
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              sed -i 's/\r$//' "$file"
            fi
          done

      - name: Install linting tools
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            aarch64|arm64) ARCH_SUFFIX="arm64"; SC_ARCH="aarch64" ;;
            x86_64|amd64)  ARCH_SUFFIX="amd64"; SC_ARCH="x86_64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          if ! command -v xz >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -yqq xz-utils 2>/dev/null || true
          fi
          if ! shellcheck --version >/dev/null 2>&1; then
            if curl -fsSL -o /tmp/shellcheck.tar.xz "https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.${SC_ARCH}.tar.xz" 2>/dev/null; then
              tar -xJf /tmp/shellcheck.tar.xz -C /tmp "shellcheck-v0.10.0/shellcheck" 2>/dev/null && sudo cp "/tmp/shellcheck-v0.10.0/shellcheck" /usr/local/bin/shellcheck && sudo chmod +x /usr/local/bin/shellcheck && echo "shellcheck installed" || echo "WARNING: Could not install shellcheck"
            else
              echo "WARNING: Could not download shellcheck"
            fi
          fi
          if ! hadolint --version >/dev/null 2>&1; then
            if curl -fsSL -o /tmp/hadolint "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-${ARCH_SUFFIX}" 2>/dev/null; then
              sudo cp /tmp/hadolint /usr/local/bin/hadolint && sudo chmod +x /usr/local/bin/hadolint && echo "hadolint installed" || echo "WARNING: Could not install hadolint"
            else
              echo "WARNING: Could not download hadolint"
            fi
          fi
          if ! shfmt --version >/dev/null 2>&1; then
            if curl -fsSL -o /tmp/shfmt "https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_${ARCH_SUFFIX}" 2>/dev/null; then
              sudo cp /tmp/shfmt /usr/local/bin/shfmt && sudo chmod +x /usr/local/bin/shfmt && echo "shfmt installed" || echo "WARNING: Could not install shfmt"
            else
              echo "WARNING: Could not download shfmt"
            fi
          fi
          echo "shellcheck: $(shellcheck --version 2>/dev/null | head -1 || echo 'not available')"
          echo "hadolint: $(hadolint --version 2>/dev/null || echo 'not available')"
          echo "shfmt: $(shfmt --version 2>/dev/null || echo 'not available')"

      - name: Lint shell scripts
        run: |
          set -euo pipefail
          RC=0
          find . -type f \( -name "*.sh" -o -name "run" \) ! -path "./.git/*" | while read -r f; do
            if ! shellcheck -x -s bash "$f" 2>&1; then
              echo "::error file=$f::shellcheck found issues"
            fi
          done
          echo "Shellcheck done"

      - name: Lint Dockerfiles
        run: |
          set -euo pipefail
          find . -name "Dockerfile*" ! -path "./.git/*" | while read -r f; do
            if ! hadolint "$f" 2>&1; then
              echo "::warning file=$f::hadolint found issues"
            fi
          done
          echo "Hadolint done"

      - name: Format shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "run" \) ! -path "./.git/*" -exec shfmt -w -i 4 -ci -bn -sr {} +

      - name: Restore executable permissions
        run: find . -type f \( -name "*.sh" -o -name "run" \) -exec chmod +x {} \;

  lint-autofix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Fix CRLF in all text files
        run: |
          set -euo pipefail
          find . -type f -name '*.sh' -o -name '*.yaml' -o -name '*.yml' -o -name '*.json' -o -name '*.md' -o -name '*.txt' -o -name '*.cfg' -o -name '*.conf' -o -name '*.py' | while read -r file; do
            sed -i 's/\r$//' "$file"
          done

      - name: Install linting tools
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            aarch64|arm64) ARCH_SUFFIX="arm64" ;;
            x86_64|amd64)  ARCH_SUFFIX="amd64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          if ! shfmt --version >/dev/null 2>&1; then
            curl -fsSL -o /tmp/shfmt "https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_${ARCH_SUFFIX}"
            sudo cp /tmp/shfmt /usr/local/bin/shfmt && sudo chmod +x /usr/local/bin/shfmt || echo "WARNING: Could not install shfmt"
          fi

      - name: Format shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "run" \) ! -path "./.git/*" -exec shfmt -w -i 4 -ci -bn -sr {} +

      - name: Restore executable permissions
        run: find . -type f \( -name "*.sh" -o -name "run" \) -exec chmod +x {} \;

      - name: Check for changes
        id: changed
        run: |
          if ! git diff --quiet; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: "Github bot: fix linting issues"
          commit-message: "fix: auto-fix linting issues"
          branch-suffix: timestamp
