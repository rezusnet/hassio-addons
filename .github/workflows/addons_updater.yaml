# yamllint disable rule:line-length
---
name: Addons updater
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes pushed)"
        type: boolean
        default: false
      verbose:
        description: "Verbose logging"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-addons:
    if: github.repository_owner == 'rezusnet'
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Clean stale git config
        run: |
          git config --global --unset-all credential.helper 2>/dev/null || true
          git config --global --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ADMIN_PAT }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            wget -qO /tmp/jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-arm64
            sudo cp /tmp/jq /usr/local/bin/jq
            sudo chmod +x /usr/local/bin/jq
          fi
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -yqq skopeo 2>/dev/null || \
            sudo pacman -S --noconfirm skopeo 2>/dev/null || \
            echo "skopeo not available, tag verification will use curl fallback"
          fi
          echo "jq: $(jq --version 2>/dev/null || echo 'not available')"
          echo "skopeo: $(skopeo --version 2>/dev/null || echo 'not available')"
          echo "curl: $(curl --version 2>/dev/null | head -1 || echo 'not available')"

      - name: Run updater
        id: updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          VERBOSE: ${{ inputs.verbose || 'true' }}
        run: |
          set -euo pipefail
          bash .github/scripts/updater.sh

      - name: Create Pull Request
        if: >-
          ${{
            steps.updater.outputs.has_updates != '0' &&
            steps.updater.outputs.has_updates != '' &&
            (inputs.dry_run || 'false') != 'true'
          }}
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.ADMIN_PAT }}
          commit-message: "chore: update upstream versions ${{ steps.updater.outputs.date_stamp }}"
          title: "chore: update upstream versions ${{ steps.updater.outputs.date_stamp }}"
          body: |
            ## Upstream version updates

            ${{ steps.updater.outputs.changes }}

            Auto-generated by the daily updater workflow.
          branch: updater/bump-${{ steps.updater.outputs.date_stamp_compact }}
          labels: |
            automerge
            dependencies
          delete-branch: true
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Auto-merge PR
        if: >-
          ${{
            steps.cpr.outputs.pull-request-operation == 'created' ||
            steps.cpr.outputs.pull-request-operation == 'updated'
          }}
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          PR_NUMBER="${{ steps.cpr.outputs.pull-request-number }}"
          echo "Auto-merging PR #${PR_NUMBER}"

          if ! command -v gh >/dev/null 2>&1; then
            echo "Installing gh CLI..."
            (sudo apt-get update -qq && sudo apt-get install -yqq gh 2>/dev/null) || \
            (sudo pacman -S --noconfirm github-cli 2>/dev/null) || \
            (brew install gh 2>/dev/null) || \
            echo "WARNING: Could not install gh CLI"
          fi

          if command -v gh >/dev/null 2>&1; then
            gh pr merge "$PR_NUMBER" --squash --admin --delete-branch && echo "Merged PR #${PR_NUMBER}"
          else
            echo "gh CLI not available, trying GitHub API"
            curl -sf \
              -X PUT \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/merge" \
              -d '{"merge_method":"squash"}' && echo "Merged PR #${PR_NUMBER} via API"
          fi

      - name: Cleanup
        if: always()
        run: |
          git config --global --unset-all credential.helper 2>/dev/null || true
          git config --global --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true
