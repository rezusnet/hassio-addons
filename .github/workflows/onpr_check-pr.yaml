# yamllint disable rule:line-length
---
name: PR Check Build

on:
  pull_request:
    branches:
      - master

permissions: read-all

jobs:
  check-addon-changes:
    if: ${{ github.repository_owner == 'rezusnet' && !github.event.pull_request.draft && !contains(github.event.head_commit.message, 'nobuild') }}
    runs-on: self-hosted
    outputs:
      changedAddons: ${{ steps.find_addons.outputs.changed_addons }}
      changedChangelogFiles: ${{ steps.changed-files.outputs.changelogs_files }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Find changed addon directories
        id: find_addons
        run: |
          set -euo pipefail
          git fetch origin refs/heads/master:refs/remotes/origin/master || true
          changed_config_files=$(git diff --name-only origin/master "${{ github.sha }}" | grep -E '^[^/]+/config\.(json|ya?ml)$' || true)
          echo "Changed config files:"
          echo "$changed_config_files"
          changed_addons=$(printf '%s' "$changed_config_files" | awk -F/ '{print $1}' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Changed addons: $changed_addons"
          echo "changed_addons=$changed_addons" >> "$GITHUB_OUTPUT"
      - name: Find changelog
        id: changed-files
        run: |
          set -euo pipefail
          git fetch origin refs/heads/master:refs/remotes/origin/master || true
          changed_changelog_files=$(git diff --name-only origin/master "${{ github.sha }}" | grep -iE '^([^/]+/)?changelog\.(md|txt|ya?ml|json)$' || true)
          changed_config_files=$(git diff --name-only origin/master "${{ github.sha }}" | grep -E '^[^/]+/config\.(json|ya?ml)$' || true)
          all_changed_files=$(echo -e "$changed_config_files\n$changed_changelog_files" | sort -u)
          changed_addons=$(printf '%s' "$all_changed_files" | awk -F/ '{print $1}' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "changed_addons=$changed_addons" >> "$GITHUB_OUTPUT"
          {
            echo "changelogs_files<<GITHUB_EOF"
            echo "$changed_changelog_files"
            echo "GITHUB_EOF"
          } >> "$GITHUB_OUTPUT"

  check-changed-changelog:
    name: Check if CHANGELOG.md changed
    needs: check-addon-changes
    if: ${{ needs.check-addon-changes.outputs.changedAddons != '[]' }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
    steps:
      - name: Check for updated CHANGELOG.md
        shell: bash
        run: |
          if [[ ! "${{ needs.check-addon-changes.outputs.changedChangelogFiles }}" =~ "${{ matrix.addon }}/CHANGELOG.md" ]]; then
            echo "::error::No new entries in ${{ matrix.addon }} CHANGELOG.md file!"
            exit 1
          fi

  addon-linter:
    name: Addon linting
    needs: check-addon-changes
    if: ${{ needs.check-addon-changes.outputs.changedAddons != '[]' }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install PyYAML
        run: |
          if python3 -c "import yaml" 2>/dev/null; then
            echo "PyYAML already available"
          elif python3 -m pip --version >/dev/null 2>&1; then
            python3 -m pip install --disable-pip-version-check --break-system-packages pyyaml
          elif command -v pacman >/dev/null 2>&1; then
            sudo pacman -S --noconfirm python-pyyaml
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -yqq python3-yaml
          else
            echo "ERROR: Cannot install PyYAML" >&2
            exit 1
          fi
      - name: Lint addon config
        shell: bash
        run: |
          set -euo pipefail
          ADDON="${{ matrix.addon }}"
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          addon = "${{ matrix.addon }}"
          addon_dir = Path(addon)

          def load_config():
              for name in ["config.yaml", "config.yml", "config.json"]:
                  p = addon_dir / name
                  if p.exists():
                      text = p.read_text()
                      if p.suffix == ".json":
                          return json.loads(text)
                      import yaml
                      return yaml.safe_load(text) or {}
              return {}

          config = load_config()
          errors = []
          for field in ["name", "description", "version", "slug", "arch"]:
              if field not in config:
                  errors.append(f"Missing required field: {field}")
          if "arch" in config and not isinstance(config["arch"], list):
              errors.append("arch must be a list")
          if "image" in config and "{arch}" not in str(config["image"]):
              errors.append("image must contain {arch} placeholder")
          if "options" in config and "schema" not in config:
              errors.append("schema is required when options is defined")
          if not (addon_dir / "Dockerfile").exists():
              errors.append("Dockerfile is missing")
          for e in errors:
              print(f"::error::{e}")
          if errors:
              sys.exit(1)
          print(f"Lint passed for {addon}")
          PY

  check-build:
    name: Test addon build
    needs: check-addon-changes
    if: ${{ needs.check-addon-changes.outputs.changedAddons != '[]' }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install PyYAML
        run: |
          if python3 -c "import yaml" 2>/dev/null; then
            echo "PyYAML already available"
          elif python3 -m pip --version >/dev/null 2>&1; then
            python3 -m pip install --disable-pip-version-check --break-system-packages pyyaml
          elif command -v pacman >/dev/null 2>&1; then
            sudo pacman -S --noconfirm python-pyyaml
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -yqq python3-yaml
          else
            echo "ERROR: Cannot install PyYAML" >&2
            exit 1
          fi

      - name: Read addon metadata
        id: info
        run: |
          set -euo pipefail
          ADDON="${{ matrix.addon }}"
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          import yaml

          addon = os.environ["ADDON"]
          addon_dir = Path(addon)
          output_path = Path(os.environ["GITHUB_OUTPUT"])

          def load_config():
              for name in ["config.yaml", "config.yml", "config.json"]:
                  p = addon_dir / name
                  if p.exists():
                      text = p.read_text()
                      if p.suffix == ".json":
                          return json.loads(text)
                      return yaml.safe_load(text) or {}
              return {}

          def load_build():
              for name in ["build.json", "build.yaml", "build.yml"]:
                  p = addon_dir / name
                  if p.exists():
                      text = p.read_text()
                      if p.suffix == ".json":
                          return json.loads(text)
                      return yaml.safe_load(text) or {}
              return {}

          config = load_config()
          build = load_build()
          build_from = build.get("build_from", {})

          for arch in ["amd64", "aarch64"]:
              has_arch = arch in (build_from.keys() if build_from else config.get("arch", []))
              build_from_image = build_from.get(arch, "") if build_from else ""
              with output_path.open("a") as f:
                  f.write(f"{arch}={'true' if has_arch else 'false'}\n")
                  f.write(f"{arch}_build_from={build_from_image}\n")

          options = config.get("options", {})
          options_json = json.dumps(options)
          health_port = ""
          for p in config.get("ports", {}):
              port_str = str(p).split("/")[0]
              health_port = port_str
              break

          host_network = config.get("host_network", False)
          host_dbus = config.get("host_dbus", False)
          udev = config.get("udev", False)
          maps = config.get("map", [])
          devices = config.get("devices", [])
          privileged = config.get("privileged", [])
          env_vars = config.get("environment", {})

          with output_path.open("a") as f:
              f.write(f"health_port={health_port}\n")
              f.write(f"options_json={options_json}\n")
              f.write(f"host_network={str(host_network).lower()}\n")
              f.write(f"host_dbus={str(host_dbus).lower()}\n")
              f.write(f"udev={str(udev).lower()}\n")
              f.write(f"maps_json={json.dumps(maps)}\n")
              f.write(f"devices_json={json.dumps(devices)}\n")
              f.write(f"privileged_json={json.dumps(privileged)}\n")
              f.write(f"env_vars_json={json.dumps(env_vars)}\n")
          PY
        env:
          ADDON: ${{ matrix.addon }}

      - name: Copy templates into addon build context
        env:
          ADDON: ${{ matrix.addon }}
        run: |
          set -euo pipefail
          TEMPLATES_DIR=".templates"
          ADDON_DIR="./$ADDON"

          for script in ha_automodules.sh ha_autoapps.sh ha_entrypoint.sh bashio-standalone.sh ha_lsio.sh; do
            if [ -f "$TEMPLATES_DIR/$script" ]; then
              cp "$TEMPLATES_DIR/$script" "$ADDON_DIR/$script"
            fi
          done

          mkdir -p "$ADDON_DIR/modules"
          for module in 00-banner.sh 01-custom_script.sh 00-local_mounts.sh 00-smb_mounts.sh 01-config_yaml.sh 00-global_var.sh; do
            if [ -f "$TEMPLATES_DIR/$module" ]; then
              cp "$TEMPLATES_DIR/$module" "$ADDON_DIR/modules/$module"
            fi
          done

      - name: Detect native architecture
        id: arch
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"
          elif [ "$ARCH" = "aarch64" ]; then ARCH="aarch64"
          fi
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

      - name: Build addon image (native arch)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ matrix.addon }}
          push: false
          load: true
          file: ${{ matrix.addon }}/Dockerfile
          tags: test/${{ matrix.addon }}:smoke
          network: host
          build-args: |
            BUILD_FROM=${{ steps.arch.outputs.arch == 'amd64' && steps.info.outputs.amd64_build_from || steps.info.outputs.aarch64_build_from }}

      - name: Smoke test - run and health check
        run: |
          set -euo pipefail
          ADDON="${{ matrix.addon }}"
          IMAGE="test/${ADDON}:smoke"
          HEALTH_PORT="${{ steps.info.outputs.health_port }}"
          HOST_NETWORK="${{ steps.info.outputs.host_network }}"
          HOST_DBUS="${{ steps.info.outputs.host_dbus }}"
          UDEV="${{ steps.info.outputs.udev }}"
          OPTIONS_JSON='${{ steps.info.outputs.options_json }}'
          MAPS_JSON='${{ steps.info.outputs.maps_json }}'
          DEVICES_JSON='${{ steps.info.outputs.devices_json }}'
          PRIVILEGED_JSON='${{ steps.info.outputs.privileged_json }}'
          ENV_VARS_JSON='${{ steps.info.outputs.env_vars_json }}'

          echo "=== Smoke test for ${ADDON} ==="
          echo "Image: ${IMAGE}"
          echo "Health port: ${HEALTH_PORT}"
          echo "Host network: ${HOST_NETWORK}"

          TEST_DIR=$(mktemp -d)
          mkdir -p "${TEST_DIR}/data" "${TEST_DIR}/share" "${TEST_DIR}/media" \
                    "${TEST_DIR}/ssl" "${TEST_DIR}/addon_configs/${ADDON}" "${TEST_DIR}/backup"

          echo "${OPTIONS_JSON}" > "${TEST_DIR}/data/options.json"

          cleanup() {
            echo "Cleaning up..."
            docker rm -f "smoke-${ADDON}" 2>/dev/null || true
            rm -rf "${TEST_DIR}" 2>/dev/null || true
          }
          trap cleanup EXIT

          RUN_ARGS=("--name" "smoke-${ADDON}")

          # --- Network ---
          if [ "${HOST_NETWORK}" = "true" ]; then
            RUN_ARGS+=("--network" "host")
          elif [ -n "${HEALTH_PORT}" ]; then
            RUN_ARGS+=("-p" "${HEALTH_PORT}:${HEALTH_PORT}")
          fi

          # --- Capabilities from privileged field ---
          while IFS= read -r cap; do
            [ -n "${cap}" ] || continue
            RUN_ARGS+=("--cap-add" "${cap}")
          done < <(echo "${PRIVILEGED_JSON}" | jq -r '.[] // empty' 2>/dev/null)

          # --- Volume mounts from map ---
          RUN_ARGS+=("-v" "${TEST_DIR}/data:/data:rw")

          while IFS= read -r entry; do
            [ -n "${entry}" ] || continue
            map_name=$(echo "${entry}" | cut -d: -f1)
            map_mode=$(echo "${entry}" | cut -d: -f2 -s)
            [ -z "${map_mode}" ] && map_mode="rw"
            case "${map_name}" in
              addon_config)
                RUN_ARGS+=("-v" "${TEST_DIR}/addon_configs/${ADDON}:/addon_configs/${ADDON}:${map_mode}")
                ;;
              media)
                RUN_ARGS+=("-v" "${TEST_DIR}/media:/media:${map_mode}")
                ;;
              share)
                RUN_ARGS+=("-v" "${TEST_DIR}/share:/share:${map_mode}")
                ;;
              ssl)
                RUN_ARGS+=("-v" "${TEST_DIR}/ssl:/ssl:${map_mode}")
                ;;
              backup)
                RUN_ARGS+=("-v" "${TEST_DIR}/backup:/backup:${map_mode}")
                ;;
              *)
                echo "  Note: map '${map_name}' skipped"
                ;;
            esac
          done < <(echo "${MAPS_JSON}" | jq -r '.[] // empty' 2>/dev/null)

          # --- Devices ---
          while IFS= read -r dev; do
            [ -n "${dev}" ] || continue
            if [ -e "${dev}" ]; then
              RUN_ARGS+=("--device" "${dev}")
            fi
          done < <(echo "${DEVICES_JSON}" | jq -r '.[] // empty' 2>/dev/null)

          # --- Environment variables ---
          while IFS= read -r envline; do
            [ -n "${envline}" ] || continue
            RUN_ARGS+=("-e" "${envline}")
          done < <(echo "${ENV_VARS_JSON}" | jq -r 'to_entries[] | "\(.key)=\(.value)"' 2>/dev/null)

          # --- Host DBus ---
          if [ "${HOST_DBUS}" = "true" ] && [ -e /run/dbus ]; then
            RUN_ARGS+=("-v" "/run/dbus:/run/dbus:ro")
          fi

          # --- Udev ---
          if [ "${UDEV}" = "true" ] && [ -e /run/udev ]; then
            RUN_ARGS+=("-v" "/run/udev:/run/udev:ro")
          fi

          echo "Starting container with $(echo "${RUN_ARGS[@]}" | wc -w) args..."
          docker run -d "${RUN_ARGS[@]}" "${IMAGE}"

          echo "Waiting for startup (max 120s)..."
          MAX_WAIT=24
          HEALTHY=false
          for i in $(seq 1 $MAX_WAIT); do
            if ! docker ps --filter "name=smoke-${ADDON}" --format '{{.Names}}' | grep -q "smoke-${ADDON}"; then
              EXIT_CODE=$(docker inspect "smoke-${ADDON}" --format='{{.State.ExitCode}}' 2>/dev/null || echo "unknown")
              echo "::error::Container exited with code ${EXIT_CODE} after $((i * 5))s"
              echo "=== Container logs ==="
              docker logs "smoke-${ADDON}" 2>&1 || true
              exit 1
            fi

            if [ -n "${HEALTH_PORT}" ]; then
              if curl -sf -o /dev/null "http://127.0.0.1:${HEALTH_PORT}/" 2>/dev/null; then
                echo "Health check PASSED after $((i * 5))s"
                HEALTHY=true
                break
              fi
            fi

            echo "  Waiting... ($((i * 5))s)"
            sleep 5
          done

          echo "=== Container logs ==="
          docker logs "smoke-${ADDON}" 2>&1 || true

          if [ "${HEALTHY}" = "true" ]; then
            echo "Smoke test PASSED for ${ADDON} (health endpoint responding)"
          elif docker ps --filter "name=smoke-${ADDON}" --format '{{.Names}}' | grep -q "smoke-${ADDON}"; then
            echo "::warning::Smoke test SOFT PASS for ${ADDON} (container running, health endpoint not yet responding - app may need more startup time)"
          else
            echo "::error::Container is not running"
            exit 1
          fi
          exit 0
