arch:
  - aarch64
  - amd64
description: "HTPC Manager - based on linuxserver/docker-htpcmanager"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/htpcmanager-{arch}
init: false
name: HTPC Manager
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/htpcmanager
  env_vars: []
ports:
  8085/tcp: 8085
ports_description:
  8085/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8085
panel_icon: mdi:server
slug: htpcmanager
url: https://github.com/linuxserver/docker-htpcmanager
version: 1.0.0
