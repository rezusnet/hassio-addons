icon: icon.png
homeassistant: "2024.1.0"
name: "Ubooquity"
description: "Lightweight comic and ebook server with OPDS support"
url: "https://github.com/linuxserver/docker-ubooquity"
arch:
  - aarch64
  - amd64
image: ghcr.io/rezusnet/ubooquity-{arch}
ingress: true
ingress_port: 2203
ingress_path: "/ubooquity/admin"
ports:
  2202/tcp: 2202
  2203/tcp: 2203
ports_description:
  2202/tcp: "Library web interface"
  2203/tcp: "Admin panel"
map:
  - config:rw
  - media:rw
  - share:rw
options:
  PUID: 1000
  PGID: 1000
  TZ: "Etc/UTC"
  MAXMEM: 512
schema:
  PUID: int
  PGID: int
  TZ: str
  MAXMEM: int?

slug: ubooquity
version: "1.0.0"
