name: LazyLibrarian
description: LazyLibrarian - eBook automation and library management (linuxserver/lazylibrarian)
version: 1.0.0
slug: lazylibrarian
image: ghcr.io/rezusnet/lazylibrarian-{arch}
homeassistant: "2024.1.0"
arch:
  - aarch64
  - amd64
url: https://github.com/linuxserver/docker-lazylibrarian
icon: icon.png
init: false
startup: services
boot: auto
ports:
  8383/tcp:
    description: LazyLibrarian web interface
ports_description:
  8383/tcp: "LazyLibrarian web interface"
panel_icon: mdi:book-open-variant
panel_admin: true
ingress: true
ingress_port: 8383
ingress_protocol: http
apparmor: profile
hassio_api: true
privileged: []
devices: []
udev: []
auto_uart: false
realtime: false
tmpfs: medium

options:
  PUID: 1000
  PGID: 1000
  TZ: UTC
  data_location: /share/lazylibrarian
  env_vars: []

schema:
  PUID: int
  PGID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
