arch:
  - aarch64
  - amd64
description: "LazyLibrarian - based on linuxserver/docker-lazylibrarian"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/lazylibrarian-{arch}
init: false
name: LazyLibrarian
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/lazylibrarian
  env_vars: []
ports:
  8383/tcp: 8383
ports_description:
  8383/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8383
panel_icon: mdi:server
slug: lazylibrarian
url: https://github.com/linuxserver/docker-lazylibrarian
version: 1.0.0
