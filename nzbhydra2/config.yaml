arch:
  - aarch64
  - amd64
description: "NZBHydra2 - based on linuxserver/docker-nzbhydra2"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/nzbhydra2-{arch}
init: false
name: NZBHydra2
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/nzbhydra2
  env_vars: []
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8080
panel_icon: mdi:server
slug: nzbhydra2
url: https://github.com/linuxserver/docker-nzbhydra2
version: 1.0.0
