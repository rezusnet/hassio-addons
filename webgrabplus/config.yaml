arch:
  - aarch64
  - amd64
description: "WebGrab+Plus - based on linuxserver/docker-webgrabplus"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/webgrabplus-{arch}
init: false
name: WebGrab+Plus
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/webgrabplus
  env_vars: []
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8000
panel_icon: mdi:server
slug: webgrabplus
url: https://github.com/linuxserver/docker-webgrabplus
version: 1.0.0
