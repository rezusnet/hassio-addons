---
arch:
  - aarch64
  - amd64
description: >-
  S3-compatible object storage server. Open source MinIO fork by Pigsty (Silo).
  Fully compatible with S3 API, supports buckets, versioning, and a web console.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/minio-{arch}
ingress: true
ingress_port: 9001
ingress_stream: true
init: true
map:
  - addon_config:rw
  - share:rw
  - ssl
name: MinIO
panel_icon: mdi:database
options:
  access_key: minioadmin
  secret_key: minioadmin
  data_location: /share/minio
  api_port: 9000
  console_port: 9001
  TZ: ""
  env_vars: []
ports:
  9000/tcp: null
  9001/tcp: null
ports_description:
  9000/tcp: S3 API endpoint (optional, enable for external access)
  9001/tcp: Web Console (optional, ingress recommended)
schema:
  access_key: str
  secret_key: password
  data_location: str
  api_port: port
  console_port: port
  TZ: str?
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: minio
url: https://silo.pigsty.io
version: RELEASE.2026-04-17T00-00-00Z
