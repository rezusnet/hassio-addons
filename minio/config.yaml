---
arch:
  - aarch64
  - amd64
description: >-
  S3-compatible object storage server. Open source MinIO fork by Pigsty (Silo).
  Fully compatible with S3 API, supports buckets, versioning, and a web console.
homeassistant: 2024.1.0
icon: icon.png
image: ghcr.io/rezusnet/minio-{arch}
ingress: true
ingress_port: 9001
ingress_stream: true
init: true
map:
  - addon_config:rw
  - share:rw
  - ssl
name: MinIO
panel_icon: mdi:database
options:
  access_key: minioadmin
  secret_key: minioadmin
  data_location: /share/minio
  TZ: ""
  env_vars: []
ports:
  9000/tcp: 19000
  9001/tcp: 19001
schema:
  access_key: str
  secret_key: password
  data_location: str
  TZ: str?
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
slug: minio
url: https://silo.pigsty.io
version: "RELEASE.2026-06-18T00-00-00Z.2"
