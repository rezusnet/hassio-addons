arch:
  - aarch64
  - amd64
description: "Duplicati - based on linuxserver/docker-duplicati"
homeassistant: "2024.1.0"
icon: icon.png
image: ghcr.io/rezusnet/duplicati-{arch}
init: false
name: Duplicati
options:
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/duplicati
  env_vars: []
ports:
  8200/tcp: 8200
ports_description:
  8200/tcp: "Web interface"
schema:
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
ingress: true
ingress_port: 8200
panel_icon: mdi:server
slug: duplicati
url: https://github.com/linuxserver/docker-duplicati
version: 1.0.0
