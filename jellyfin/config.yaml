arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
  - "**/log/"
  - "**/transcode/"
description:
  The Free Software Media System. Stream media to any device from your own
  server. Supports hardware transcoding on Intel, AMD, and Raspberry Pi GPUs.
devices:
  - /dev/dri
  - /dev/dri/card0
  - /dev/dri/card1
  - /dev/dri/renderD128
  - /dev/vchiq
  - /dev/video10
  - /dev/video11
  - /dev/video12
  - /dev/video13
  - /dev/video14
  - /dev/video15
  - /dev/video16
  - /dev/ttyUSB0
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/nvme0n1
  - /dev/nvme0n1p1
  - /dev/nvme0n1p2
  - /dev/nvme0n1p3
  - /dev/nvme1n1
  - /dev/nvme1n1p1
  - /dev/nvme1n1p2
  - /dev/nvme1n1p3
  - /dev/mmcblk
  - /dev/fuse
environment:
  ATTACHED_DEVICES_PERMS: "/dev/dri /dev/dvb /dev/vchiq /dev/vc-mem /dev/video1? -type c -o -type f"
homeassistant: 2024.1.0
host_dbus: true
host_network: true
icon: icon.png
image: ghcr.io/rezusnet/jellyfin-{arch}
ingress: true
ingress_port: 0
ingress_stream: true
init: false
map:
  - addon_config:rw
  - media:rw
  - share:rw
  - ssl
name: Jellyfin
options:
  env_vars: []
  PGID: 0
  PUID: 0
  data_location: /share/jellyfin
  TZ: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  DOCKER_MODS: []
panel_icon: mdi:filmstrip
ports:
  1900/udp: null
  7359/udp: null
  8096/tcp: 8096
  8920/tcp: 8920
ports_description:
  1900/udp: DLNA (optional)
  7359/udp: Client discovery (optional)
  8096/tcp: Web interface
  8920/tcp: HTTPS web interface (optional)
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  data_location: str
  TZ: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  DOCKER_MODS:
    - match(^linuxserver/mods:jellyfin-[a-z0-9-]+$)?
slug: jellyfin
udev: true
url: https://jellyfin.org
version: "10.11.12"
video: true
