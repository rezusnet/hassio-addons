<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e1e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="200" fill="url(#bgGradient)"/>
  
  <!-- Music notes decoration -->
  <g opacity="0.3">
    <path d="M 100 40 Q 110 30 120 40 L 120 120 Q 110 130 100 120 Z" fill="#64c864" stroke="#64c864" stroke-width="2"/>
    <path d="M 480 50 Q 490 40 500 50 L 500 130 Q 490 140 480 130 Z" fill="#64c864" stroke="#64c864" stroke-width="2"/>
  </g>
  
  <!-- Main title -->
  <text x="300" y="80" font-size="64" font-weight="bold" text-anchor="middle" fill="#64c864" font-family="Arial, sans-serif">
    Beets
  </text>
  
  <!-- Subtitle -->
  <text x="300" y="140" font-size="24" text-anchor="middle" fill="#cccccc" font-family="Arial, sans-serif">
    Music Library Organizer &amp; Tagger
  </text>
  
  <!-- Decorative line -->
  <line x1="150" y1="155" x2="450" y2="155" stroke="#64c864" stroke-width="2" opacity="0.6"/>
</svg>
