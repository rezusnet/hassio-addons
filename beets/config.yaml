name: Beets
description: Beets - Music library organizer and tagger
version: 1.0.0
slug: beets
image: ghcr.io/rezusnet/beets-{arch}
homeassistant: "2024.1.0"
arch:
  - aarch64
  - amd64
url: https://beets.io/
init: false
startup: services
boot: auto
ports:
  8337/tcp:
    description: Beets web interface
ports_description:
  8337/tcp: "Beets web interface"
panel_icon: mdi:music-box-multiple
panel_admin: true
ingress: true
ingress_port: 8337
ingress_protocol: http
apparmor: profile
hassio_api: true
privileged: []
devices: []
udev: []
auto_uart: false
realtime: false
tmpfs: medium

options:
  PUID: 1000
  PGID: 1000
  TZ: UTC
  data_location: /share/beets
  env_vars: []

schema:
  PUID: int
  PGID: int
  TZ: str?
  data_location: str
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
