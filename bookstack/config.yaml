arch:
  - aarch64
  - amd64
description: >
  BookStack is a simple, self-hosted, open-source documentation platform with
  a WYSIWYG editor, Markdown support, LDAP/SAML authentication, and powerful
  search. Requires a MariaDB database.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/bookstack-{arch}
ingress: true
ingress_port: 80
ingress_stream: true
map:
  - addon_config:rw
name: Bookstack
options:
  env_vars: []
  TZ: ""
  APP_URL: "http://hassio.local:6875"
  APP_KEY: ""
  DB_HOST: "core-mariadb"
  DB_PORT: 3306
  DB_USERNAME: "bookstack"
  DB_PASSWORD: ""
  DB_DATABASE: "bookstack"
  QUEUE_CONNECTION: ""
  localdisks: ""
  networkdisks: ""
  cifsusername: ""
  cifspassword: ""
  cifsdomain: ""
  DOCKER_MODS: []
panel_icon: mdi:book-open-page-variant
ports:
  6875/tcp: 80
ports_description:
  6875/tcp: Web interface (optional if using Ingress)
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  TZ: str?
  APP_URL: str
  APP_KEY: str
  DB_HOST: str
  DB_PORT: int
  DB_USERNAME: str
  DB_PASSWORD: password
  DB_DATABASE: str
  QUEUE_CONNECTION: str?
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
  DOCKER_MODS:
    - match(^linuxserver/mods:bookstack-[a-z0-9-]+$)?
slug: bookstack
url: https://www.bookstackapp.com
version: "1.0.0"

