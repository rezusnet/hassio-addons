arch:
  - aarch64
  - amd64
backup_exclude:
  - "**/cache/"
description:
  Self-hosted digital comic/manga/book server with a web-based reader.
  Based on the linuxserver.io image.
environment:
  PGID: "0"
  PUID: "0"
homeassistant: 2024.1.0
image: ghcr.io/rezusnet/kavita-{arch}
ingress: true
ingress_port: 5000
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
  - media:rw
name: Kavita
options:
  env_vars: []
  PGID: 0
  PUID: 0
  TZ: ""
  data_location: /share/kavita
panel_admin: false
panel_icon: mdi:book-open-page-variant
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: Web Interface
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  PGID: int
  PUID: int
  TZ: str?
  data_location: str
  localdisks: str?
  networkdisks: str?
  cifsusername: str?
  cifspassword: str?
  cifsdomain: str?
slug: kavita
url: https://github.com/Kareadita/Kavita
version: "1.0.0"

